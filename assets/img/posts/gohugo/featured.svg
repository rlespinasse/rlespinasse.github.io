<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="hugoGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- ============================================================ -->
  <!-- TITLE SECTION -->
  <!-- ============================================================ -->
  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="0.5">Hugo</text>
  <text x="400" y="64" text-anchor="middle" font-size="12" fill="#64748b" font-family="'Segoe UI', Arial, sans-serif">Crafting Your Digital Identity</text>
  <line x1="310" y1="74" x2="490" y2="74" stroke="#f472b6" stroke-width="1" opacity="0.4"/>

  <!-- ============================================================ -->
  <!-- LEFT PANEL: Markdown file card -->
  <!-- ============================================================ -->
  <g transform="translate(30, 90)">
    <!-- Card shadow -->
    <rect x="4" y="4" width="200" height="290" rx="8" fill="#000000" opacity="0.4"/>
    <!-- Card body -->
    <rect width="200" height="290" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Card header bar -->
    <rect width="200" height="32" rx="8" fill="#0f172a"/>
    <rect y="24" width="200" height="8" fill="#0f172a"/>
    <!-- Dots -->
    <circle cx="16" cy="16" r="5" fill="#f87171" opacity="0.8"/>
    <circle cx="34" cy="16" r="5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="52" cy="16" r="5" fill="#4ade80" opacity="0.8"/>
    <!-- File name -->
    <text x="100" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">post.md</text>

    <!-- Front matter block -->
    <rect x="12" y="42" width="176" height="88" rx="5" fill="#0d1b2e" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Front matter lines -->
    <text x="22" y="59" font-size="10" fill="#94a3b8">---</text>
    <text x="22" y="75" font-size="10">
      <tspan fill="#f59e0b">title</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#86efac">"My First Post"</tspan>
    </text>
    <text x="22" y="91" font-size="10">
      <tspan fill="#f59e0b">date</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#86efac">2019-10-27</tspan>
    </text>
    <text x="22" y="107" font-size="10">
      <tspan fill="#f59e0b">draft</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#fb923c">false</tspan>
    </text>
    <text x="22" y="122" font-size="10" fill="#94a3b8">---</text>

    <!-- Markdown content -->
    <text x="22" y="148" font-size="11" fill="#93c5fd" font-weight="700"># Hello World</text>
    <line x1="12" y1="156" x2="188" y2="156" stroke="#1e3a5f" stroke-width="0.5"/>
    <text x="22" y="174" font-size="10" fill="#94a3b8">Building my digital</text>
    <text x="22" y="190" font-size="10" fill="#94a3b8">identity with Hugo.</text>
    <line x1="12" y1="202" x2="188" y2="202" stroke="#1e3a5f" stroke-width="0.5"/>
    <text x="22" y="218" font-size="10" fill="#7dd3fc">## About Me</text>
    <text x="22" y="234" font-size="10" fill="#94a3b8">A developer, writer,</text>
    <text x="22" y="250" font-size="10" fill="#94a3b8">and maker of things.</text>

    <!-- Tag pill at bottom -->
    <rect x="12" y="264" width="60" height="18" rx="9" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="42" y="277" text-anchor="middle" font-size="9" fill="#93c5fd">markdown</text>
    <rect x="80" y="264" width="50" height="18" rx="9" fill="#1c2f1c" stroke="#22c55e" stroke-width="1"/>
    <text x="105" y="277" text-anchor="middle" font-size="9" fill="#86efac">content</text>
  </g>

  <!-- ============================================================ -->
  <!-- ARROW: Left card → Hugo center -->
  <!-- ============================================================ -->
  <g opacity="0.8">
    <line x1="234" y1="240" x2="296" y2="240" stroke="#f472b6" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="296,234 310,240 296,246" fill="#f472b6"/>
  </g>

  <!-- ============================================================ -->
  <!-- CENTER: Hugo mascot / build engine -->
  <!-- ============================================================ -->
  <g transform="translate(400, 220)">
    <!-- Outer glow ring -->
    <circle r="68" fill="#f472b6" opacity="0.06" filter="url(#softglow)"/>
    <!-- Middle ring -->
    <circle r="52" fill="#f472b6" opacity="0.1"/>
    <!-- Inner circle -->
    <circle r="38" fill="#1e1131" stroke="#f472b6" stroke-width="2" filter="url(#glow)"/>
    <!-- H letter -->
    <text x="0" y="13" text-anchor="middle" font-size="42" font-weight="800" fill="#f472b6" filter="url(#glow)">H</text>
    <!-- Spark dots around circle -->
    <circle cx="0" cy="-55" r="2.5" fill="#f472b6" opacity="0.7"/>
    <circle cx="52" cy="-18" r="2" fill="#f472b6" opacity="0.5"/>
    <circle cx="52" cy="18" r="2" fill="#f472b6" opacity="0.5"/>
    <circle cx="-52" cy="-18" r="2" fill="#f472b6" opacity="0.5"/>
    <circle cx="-52" cy="18" r="2" fill="#f472b6" opacity="0.5"/>
    <circle cx="0" cy="55" r="2.5" fill="#f472b6" opacity="0.7"/>
  </g>

  <!-- ============================================================ -->
  <!-- ARROW: Hugo center → Right panel -->
  <!-- ============================================================ -->
  <g opacity="0.8">
    <line x1="490" y1="240" x2="552" y2="240" stroke="#4ade80" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="552,234 566,240 552,246" fill="#4ade80"/>
  </g>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL: Browser window mock -->
  <!-- ============================================================ -->
  <g transform="translate(570, 105)">
    <!-- Shadow -->
    <rect x="4" y="4" width="200" height="272" rx="8" fill="#000000" opacity="0.4"/>
    <!-- Browser outer frame -->
    <rect width="200" height="272" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

    <!-- Title bar (chrome) -->
    <rect width="200" height="32" rx="8" fill="#374151"/>
    <rect y="24" width="200" height="8" fill="#374151"/>
    <!-- Traffic light dots -->
    <circle cx="16" cy="16" r="5" fill="#f87171" opacity="0.85"/>
    <circle cx="34" cy="16" r="5" fill="#fbbf24" opacity="0.85"/>
    <circle cx="52" cy="16" r="5" fill="#4ade80" opacity="0.85"/>
    <!-- URL bar -->
    <rect x="64" y="8" width="124" height="16" rx="8" fill="#1f2937"/>
    <text x="126" y="20" text-anchor="middle" font-size="9" fill="#9ca3af" font-family="'Segoe UI', sans-serif">localhost:1313</text>

    <!-- White page content area -->
    <rect x="0" y="32" width="200" height="240" fill="#f8fafc"/>

    <!-- Nav bar -->
    <rect x="0" y="32" width="200" height="28" fill="#1e40af"/>
    <text x="14" y="51" font-size="11" fill="#ffffff" font-weight="700" font-family="'Segoe UI', sans-serif">MyBlog</text>
    <text x="110" y="51" font-size="9" fill="#93c5fd" font-family="'Segoe UI', sans-serif">Posts  About</text>

    <!-- Hero / post title area -->
    <rect x="0" y="60" width="200" height="50" fill="#eff6ff"/>
    <text x="14" y="80" font-size="12" fill="#1e3a8a" font-weight="700" font-family="'Segoe UI', sans-serif">Hello World</text>
    <text x="14" y="97" font-size="9" fill="#6b7280" font-family="'Segoe UI', sans-serif">Oct 27, 2019 · 2 min read</text>

    <!-- Content lines -->
    <rect x="14" y="122" width="140" height="7" rx="3" fill="#d1d5db"/>
    <rect x="14" y="136" width="160" height="7" rx="3" fill="#d1d5db"/>
    <rect x="14" y="150" width="120" height="7" rx="3" fill="#d1d5db"/>
    <rect x="14" y="164" width="148" height="7" rx="3" fill="#d1d5db"/>
    <rect x="14" y="178" width="100" height="7" rx="3" fill="#d1d5db"/>

    <!-- Read more link -->
    <rect x="14" y="196" width="72" height="20" rx="4" fill="#1e40af"/>
    <text x="50" y="211" text-anchor="middle" font-size="9" fill="#ffffff" font-family="'Segoe UI', sans-serif">Read more →</text>

    <!-- Footer strip -->
    <rect x="0" y="252" width="200" height="20" fill="#f1f5f9" rx="0"/>
    <rect x="0" y="262" width="200" height="10" rx="8" fill="#f1f5f9"/>
    <text x="100" y="265" text-anchor="middle" font-size="8" fill="#9ca3af" font-family="'Segoe UI', sans-serif">© 2019 MyBlog · Hugo</text>
  </g>

  <!-- ============================================================ -->
  <!-- BOTTOM: Terminal strip -->
  <!-- ============================================================ -->
  <g transform="translate(30, 420)">
    <!-- Terminal card -->
    <rect width="740" height="58" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <!-- Colored left bar -->
    <rect width="4" height="58" rx="2" fill="#f472b6"/>

    <!-- Window dots -->
    <circle cx="20" cy="16" r="4" fill="#f87171" opacity="0.7"/>
    <circle cx="36" cy="16" r="4" fill="#fbbf24" opacity="0.7"/>
    <circle cx="52" cy="16" r="4" fill="#4ade80" opacity="0.7"/>

    <!-- Command line -->
    <text x="72" y="28" font-size="12" fill="#7ee8a2">$</text>
    <text x="84" y="28" font-size="12" fill="#e2e8f0">hugo server -D</text>
    <!-- Cursor blink -->
    <rect x="200" y="17" width="7" height="13" fill="#f472b6" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Output line -->
    <text x="72" y="46" font-size="11" fill="#64748b">Web Server is available at </text>
    <text x="278" y="46" font-size="11" fill="#4ade80">http://localhost:1313/</text>
    <text x="430" y="46" font-size="11" fill="#64748b"> (bind address 127.0.0.1)</text>
  </g>

  <!-- ============================================================ -->
  <!-- Flow label arrows with small text labels -->
  <!-- ============================================================ -->
  <text x="239" y="225" font-size="9" fill="#94a3b8" text-anchor="middle">source</text>
  <text x="561" y="225" font-size="9" fill="#94a3b8" text-anchor="middle">output</text>
</svg>
