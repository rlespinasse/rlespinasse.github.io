<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="800" height="400" fill="#0f172a" rx="8"/>

  <!-- Step 1: Discover -->
  <g transform="translate(60, 100)">
    <rect width="140" height="160" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <!-- Magnifying glass -->
    <g transform="translate(50, 25)">
      <circle cx="15" cy="15" r="14" fill="none" stroke="#3b82f6" stroke-width="3"/>
      <line x1="25" y1="25" x2="36" y2="36" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="70" y="85" text-anchor="middle" font-size="16" fill="#93c5fd" font-weight="bold">Discover</text>
    <text x="70" y="108" text-anchor="middle" font-size="10" fill="#64748b">Scan project for</text>
    <text x="70" y="122" text-anchor="middle" font-size="10" fill="#64748b">existing docs</text>
    <circle cx="70" cy="145" r="12" fill="#3b82f6"/>
    <text x="70" y="150" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">1</text>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(205, 175)">
    <line x1="0" y1="0" x2="35" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="35,-5 45,0 35,5" fill="#475569"/>
  </g>

  <!-- Step 2: Classify -->
  <g transform="translate(250, 100)">
    <rect width="140" height="160" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <!-- Tag icon -->
    <g transform="translate(48, 22)">
      <rect x="0" y="5" width="35" height="25" rx="5" fill="none" stroke="#22c55e" stroke-width="2.5"/>
      <line x1="10" y1="12" x2="25" y2="12" stroke="#22c55e" stroke-width="2"/>
      <line x1="10" y1="22" x2="20" y2="22" stroke="#22c55e" stroke-width="2"/>
    </g>
    <text x="70" y="85" text-anchor="middle" font-size="16" fill="#86efac" font-weight="bold">Classify</text>
    <text x="70" y="108" text-anchor="middle" font-size="10" fill="#64748b">Assign Diataxis</text>
    <text x="70" y="122" text-anchor="middle" font-size="10" fill="#64748b">categories</text>
    <circle cx="70" cy="145" r="12" fill="#22c55e"/>
    <text x="70" y="150" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">2</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(395, 175)">
    <line x1="0" y1="0" x2="35" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="35,-5 45,0 35,5" fill="#475569"/>
  </g>

  <!-- Step 3: Propose -->
  <g transform="translate(440, 100)">
    <rect width="140" height="160" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <!-- Lightbulb icon -->
    <g transform="translate(52, 20)">
      <circle cx="15" cy="15" r="12" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
      <line x1="15" y1="27" x2="15" y2="35" stroke="#f59e0b" stroke-width="2"/>
      <line x1="10" y1="33" x2="20" y2="33" stroke="#f59e0b" stroke-width="1.5"/>
    </g>
    <text x="70" y="85" text-anchor="middle" font-size="16" fill="#fcd34d" font-weight="bold">Propose</text>
    <text x="70" y="108" text-anchor="middle" font-size="10" fill="#64748b">Suggest restructured</text>
    <text x="70" y="122" text-anchor="middle" font-size="10" fill="#64748b">layout &amp; gaps</text>
    <circle cx="70" cy="145" r="12" fill="#f59e0b"/>
    <text x="70" y="150" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">3</text>
  </g>

  <!-- Arrow 3→4 -->
  <g transform="translate(585, 175)">
    <line x1="0" y1="0" x2="35" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="35,-5 45,0 35,5" fill="#475569"/>
  </g>

  <!-- Step 4: Execute -->
  <g transform="translate(630, 100)">
    <rect width="140" height="160" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <!-- Checkmark icon -->
    <g transform="translate(48, 22)">
      <circle cx="18" cy="18" r="16" fill="none" stroke="#a855f7" stroke-width="2.5"/>
      <path d="M8,18 L15,25 L28,10" stroke="#a855f7" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="70" y="85" text-anchor="middle" font-size="16" fill="#c084fc" font-weight="bold">Execute</text>
    <text x="70" y="108" text-anchor="middle" font-size="10" fill="#64748b">With approval,</text>
    <text x="70" y="122" text-anchor="middle" font-size="10" fill="#64748b">restructure docs</text>
    <circle cx="70" cy="145" r="12" fill="#a855f7"/>
    <text x="70" y="150" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">4</text>
  </g>

  <!-- Title -->
  <text x="400" y="340" text-anchor="middle" font-size="15" fill="#e2e8f0" font-weight="600">Diataxis Skill Workflow</text>
  <text x="400" y="365" text-anchor="middle" font-size="12" fill="#64748b">Thorough without being disruptive</text>
</svg>
