<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'SF Mono', 'Fira Code', monospace">
  <defs>
    <filter id="orangeglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117"/>

  <!-- Subtle orange ambient glow top-left -->
  <circle cx="80" cy="80" r="160" fill="#f97316" opacity="0.04"/>
  <!-- Subtle green ambient glow bottom-right -->
  <circle cx="720" cy="420" r="140" fill="#3fb950" opacity="0.05"/>

  <!-- ===== TITLE AREA ===== -->
  <text x="400" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="700" fill="#f97316" filter="url(#orangeglow)" letter-spacing="-0.5">Hacktoberfest</text>
  <text x="400" y="76" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14" fill="#8b949e" letter-spacing="2">Open Source Month</text>
  <line x1="320" y1="88" x2="480" y2="88" stroke="#f97316" stroke-width="1" opacity="0.35"/>

  <!-- ===== PR CARDS (fanned stack, left area) ===== -->

  <!-- Card 4 (bottom of stack, most offset) -->
  <rect x="68" y="124" width="430" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2" opacity="0.5"/>

  <!-- Card 3 -->
  <rect x="62" y="116" width="430" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2" opacity="0.7"/>

  <!-- Card 2 -->
  <rect x="56" y="108" width="430" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2" opacity="0.85"/>

  <!-- Card 1 (top, fully visible) -->
  <rect x="50" y="100" width="430" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- PR title -->
  <text x="70" y="122" font-size="13" font-weight="600" fill="#e6edf3">feat: add slug support for branch names</text>
  <!-- Repo name -->
  <text x="70" y="142" font-size="11" fill="#8b949e">rlespinasse/github-slug-action</text>
  <!-- Merged badge -->
  <rect x="70" y="150" width="60" height="16" rx="8" fill="#1a4428"/>
  <text x="100" y="162" text-anchor="middle" font-size="10" fill="#3fb950">Merged</text>
  <!-- PR number -->
  <text x="148" y="162" font-size="11" fill="#484f58">#42</text>
  <!-- Merge icon dot -->
  <circle cx="62" cy="122" r="4" fill="#8957e5"/>

  <!-- Card 5 (second visible, slightly below) -->
  <rect x="50" y="185" width="430" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="70" y="207" font-size="13" font-weight="600" fill="#e6edf3">fix: export options not applied correctly</text>
  <text x="70" y="227" font-size="11" fill="#8b949e">rlespinasse/drawio-export-action</text>
  <rect x="70" y="235" width="60" height="16" rx="8" fill="#1a4428"/>
  <text x="100" y="247" text-anchor="middle" font-size="10" fill="#3fb950">Merged</text>
  <text x="148" y="247" font-size="11" fill="#484f58">#17</text>
  <circle cx="62" cy="207" r="4" fill="#8957e5"/>

  <!-- Card 6 (third) -->
  <rect x="50" y="270" width="430" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="70" y="292" font-size="13" font-weight="600" fill="#e6edf3">docs: update README with usage examples</text>
  <text x="70" y="312" font-size="11" fill="#8b949e">rlespinasse/github-slug-action</text>
  <rect x="70" y="320" width="60" height="16" rx="8" fill="#1a4428"/>
  <text x="100" y="332" text-anchor="middle" font-size="10" fill="#3fb950">Merged</text>
  <text x="148" y="332" font-size="11" fill="#484f58">#38</text>
  <circle cx="62" cy="292" r="4" fill="#8957e5"/>

  <!-- Card 7 (fourth) -->
  <rect x="50" y="355" width="430" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="70" y="377" font-size="13" font-weight="600" fill="#e6edf3">chore: bump dependencies to latest versions</text>
  <text x="70" y="397" font-size="11" fill="#8b949e">rlespinasse/wints</text>
  <rect x="70" y="405" width="60" height="16" rx="8" fill="#1a4428"/>
  <text x="100" y="417" text-anchor="middle" font-size="10" fill="#3fb950">Merged</text>
  <text x="148" y="417" font-size="11" fill="#484f58">#8</text>
  <circle cx="62" cy="377" r="4" fill="#8957e5"/>

