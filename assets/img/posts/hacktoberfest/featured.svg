  <!-- Big number -->
  <text x="640" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="64" font-weight="700" fill="#f97316" filter="url(#subtleglow)">4/4</text>

  <!-- completed label -->
