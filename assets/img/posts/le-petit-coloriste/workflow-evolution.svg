<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="800" height="400" fill="#fef7ff" rx="8"/>

  <!-- Step 1: Prompt brut -->
  <g transform="translate(25, 50)">
    <rect width="155" height="260" rx="12" fill="#fff" stroke="#e0d0e8" stroke-width="2"/>
    <!-- Messy prompt icon -->
    <g transform="translate(40, 25)">
      <rect x="0" y="0" width="75" height="55" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
      <text x="37" y="20" text-anchor="middle" font-size="8" fill="#b91c1c" font-family="monospace">draw a rocket</text>
      <text x="37" y="32" text-anchor="middle" font-size="8" fill="#b91c1c" font-family="monospace">for kids to</text>
      <text x="37" y="44" text-anchor="middle" font-size="8" fill="#b91c1c" font-family="monospace">color in...</text>
    </g>
    <circle cx="78" cy="110" r="14" fill="#fca5a5"/>
    <text x="78" y="115" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">1</text>
    <text x="78" y="145" text-anchor="middle" font-size="13" fill="#7c3aed" font-weight="bold">Prompt brut</text>
    <text x="78" y="165" text-anchor="middle" font-size="10" fill="#8b8b8b">Résultat</text>
    <text x="78" y="178" text-anchor="middle" font-size="10" fill="#8b8b8b">incohérent</text>
    <!-- Bad result indicator -->
    <text x="78" y="210" text-anchor="middle" font-size="24" fill="#ef4444">✗</text>
    <text x="78" y="240" text-anchor="middle" font-size="9" fill="#9ca3af">Trop de détails</text>
    <text x="78" y="253" text-anchor="middle" font-size="9" fill="#9ca3af">ou pas assez</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(188, 170)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#c084fc" stroke-width="2"/>
    <polygon points="20,-5 30,0 20,5" fill="#c084fc"/>
  </g>

  <!-- Step 2: Gemini rédige -->
  <g transform="translate(220, 50)">
    <rect width="155" height="260" rx="12" fill="#fff" stroke="#e0d0e8" stroke-width="2"/>
    <g transform="translate(40, 25)">
      <rect x="0" y="0" width="75" height="55" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
      <text x="37" y="20" text-anchor="middle" font-size="8" fill="#92400e" font-family="monospace">Create a B&amp;W</text>
      <text x="37" y="32" text-anchor="middle" font-size="8" fill="#92400e" font-family="monospace">coloring page</text>
      <text x="37" y="44" text-anchor="middle" font-size="8" fill="#92400e" font-family="monospace">thick lines...</text>
    </g>
    <circle cx="78" cy="110" r="14" fill="#fcd34d"/>
    <text x="78" y="115" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">2</text>
    <text x="78" y="145" text-anchor="middle" font-size="12" fill="#7c3aed" font-weight="bold">Gemini rédige</text>
    <text x="78" y="165" text-anchor="middle" font-size="10" fill="#8b8b8b">Meilleur prompt</text>
    <text x="78" y="178" text-anchor="middle" font-size="10" fill="#8b8b8b">contexte perdu</text>
    <text x="78" y="210" text-anchor="middle" font-size="24" fill="#f59e0b">~</text>
    <text x="78" y="240" text-anchor="middle" font-size="9" fill="#9ca3af">Doit rappeler le</text>
    <text x="78" y="253" text-anchor="middle" font-size="9" fill="#9ca3af">contexte à chaque fois</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(383, 170)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#c084fc" stroke-width="2"/>
    <polygon points="20,-5 30,0 20,5" fill="#c084fc"/>
  </g>

  <!-- Step 3: Gem packagée -->
  <g transform="translate(415, 50)">
    <rect width="155" height="260" rx="12" fill="#fff" stroke="#e0d0e8" stroke-width="2"/>
    <g transform="translate(40, 25)">
      <rect x="0" y="0" width="75" height="55" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
      <text x="37" y="15" text-anchor="middle" font-size="16">💎</text>
      <text x="37" y="32" text-anchor="middle" font-size="8" fill="#1e40af" font-family="monospace">Gem Gemini</text>
      <text x="37" y="44" text-anchor="middle" font-size="8" fill="#1e40af" font-family="monospace">configurée</text>
    </g>
    <circle cx="78" cy="110" r="14" fill="#93c5fd"/>
    <text x="78" y="115" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">3</text>
    <text x="78" y="145" text-anchor="middle" font-size="12" fill="#7c3aed" font-weight="bold">Gem packagée</text>
    <text x="78" y="165" text-anchor="middle" font-size="10" fill="#8b8b8b">Instructions</text>
    <text x="78" y="178" text-anchor="middle" font-size="10" fill="#8b8b8b">mémorisées</text>
    <text x="78" y="210" text-anchor="middle" font-size="24" fill="#3b82f6">✓</text>
    <text x="78" y="240" text-anchor="middle" font-size="9" fill="#9ca3af">Résultats cohérents</text>
    <text x="78" y="253" text-anchor="middle" font-size="9" fill="#9ca3af">à chaque utilisation</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(578, 170)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#c084fc" stroke-width="2"/>
    <polygon points="20,-5 30,0 20,5" fill="#c084fc"/>
  </g>

  <!-- Step 4: Résultat final -->
  <g transform="translate(610, 50)">
    <rect width="155" height="260" rx="12" fill="#fff" stroke="#a855f7" stroke-width="2.5"/>
    <g transform="translate(40, 25)">
      <rect x="0" y="0" width="75" height="55" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
      <!-- Mini coloring page -->
      <circle cx="37" cy="20" r="12" fill="none" stroke="#333" stroke-width="2"/>
      <path d="M27,35 L37,18 L47,35" fill="none" stroke="#333" stroke-width="2"/>
      <text x="37" y="50" text-anchor="middle" font-size="7" fill="#166534">Prêt!</text>
    </g>
    <circle cx="78" cy="110" r="14" fill="#22c55e"/>
    <text x="78" y="115" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">4</text>
    <text x="78" y="145" text-anchor="middle" font-size="12" fill="#7c3aed" font-weight="bold">Résultat final</text>
    <text x="78" y="165" text-anchor="middle" font-size="10" fill="#8b8b8b">Coloriage parfait</text>
    <text x="78" y="178" text-anchor="middle" font-size="10" fill="#8b8b8b">prêt à imprimer</text>
    <text x="78" y="210" text-anchor="middle" font-size="24" fill="#22c55e">✓✓</text>
    <text x="78" y="240" text-anchor="middle" font-size="9" fill="#9ca3af">Traits épais, fond</text>
    <text x="78" y="253" text-anchor="middle" font-size="9" fill="#9ca3af">blanc, adapté 5 ans</text>
  </g>

  <!-- Bottom label -->
  <text x="400" y="355" text-anchor="middle" font-size="14" fill="#7c3aed" font-weight="600">Évolution du workflow</text>
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#a78bfa">De prompts ad-hoc à une Gem structurée</text>
</svg>
