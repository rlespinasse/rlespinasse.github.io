<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif">
  <!-- Soft pastel background -->
  <rect width="800" height="500" fill="#fef7ff" rx="12"/>
  <rect x="10" y="10" width="780" height="480" fill="none" stroke="#e8d5f0" stroke-width="3" rx="8" stroke-dasharray="12,6"/>

  <!-- Coloring page (white sheet) -->
  <g transform="translate(150, 35)">
    <!-- Paper shadow -->
    <rect x="5" y="5" width="350" height="400" rx="4" fill="#e0d0e8"/>
    <!-- Paper -->
    <rect width="350" height="400" rx="4" fill="#ffffff" stroke="#d4c5d9" stroke-width="1.5"/>

    <!-- Rocket outline (coloring page style - black outlines, no fill) -->
    <g transform="translate(175, 200)" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <!-- Rocket body -->
      <path d="M0,-100 Q-30,-70 -30,0 L-30,50 L-15,65 L15,65 L30,50 L30,0 Q30,-70 0,-100"/>
      <!-- Window -->
      <circle cx="0" cy="-20" r="18"/>
      <!-- Inner window -->
      <circle cx="0" cy="-20" r="10" stroke-width="2"/>
      <!-- Fins -->
      <path d="M-30,30 L-55,65 L-30,55"/>
      <path d="M30,30 L55,65 L30,55"/>
      <!-- Bottom detail -->
      <line x1="-15" y1="55" x2="-15" y2="65"/>
      <line x1="0" y1="55" x2="0" y2="70"/>
      <line x1="15" y1="55" x2="15" y2="65"/>
      <!-- Flames -->
      <path d="M-15,65 Q-10,90 0,80 Q10,90 15,65" stroke-width="2.5"/>
    </g>

    <!-- Stars around rocket -->
    <g fill="none" stroke="#333" stroke-width="2.5">
      <path d="M80,60 l4,12 l12,0 l-10,8 l4,12 l-10,-7 l-10,7 l4,-12 l-10,-8 l12,0z"/>
      <path d="M280,80 l3,9 l9,0 l-7,6 l3,9 l-8,-5 l-8,5 l3,-9 l-7,-6 l9,0z"/>
      <path d="M60,280 l3,9 l9,0 l-7,6 l3,9 l-8,-5 l-8,5 l3,-9 l-7,-6 l9,0z"/>
      <path d="M300,300 l4,12 l12,0 l-10,8 l4,12 l-10,-7 l-10,7 l4,-12 l-10,-8 l12,0z"/>
      <circle cx="290" cy="200" r="8"/>
      <circle cx="70" cy="160" r="6"/>
    </g>
  </g>

  <!-- AI sparkle generating -->
  <g transform="translate(580, 150)">
    <!-- Sparkle burst -->
    <g fill="#fbbf24" opacity="0.8">
      <path d="M0,-35 L5,-12 L28,-20 L12,-5 L35,0 L12,5 L28,20 L5,12 L0,35 L-5,12 L-28,20 L-12,5 L-35,0 L-12,-5 L-28,-20 L-5,-12 Z"/>
    </g>
    <circle r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text y="5" text-anchor="middle" font-size="16">&#x2728;</text>

    <!-- "AI" label -->
    <text x="0" y="55" text-anchor="middle" font-size="14" fill="#92400e" font-weight="bold" font-family="sans-serif">Gemini</text>
  </g>

  <!-- Decorative dashed line from AI to paper -->
  <path d="M555,155 Q520,120 500,140" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4" fill="none"/>

  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-size="24" fill="#7c3aed" font-weight="bold">Le Petit</text>
  <text x="600" y="325" text-anchor="middle" font-size="24" fill="#7c3aed" font-weight="bold">Coloriste</text>
  <text x="600" y="360" text-anchor="middle" font-size="13" fill="#a78bfa" font-family="sans-serif">Pages de coloriage</text>
  <text x="600" y="378" text-anchor="middle" font-size="13" fill="#a78bfa" font-family="sans-serif">générées par IA</text>

  <!-- Colored pencils at bottom -->
  <g transform="translate(530, 400)">
    <rect x="0" y="0" width="8" height="50" rx="2" fill="#ef4444" transform="rotate(-15, 4, 25)"/>
    <rect x="20" y="0" width="8" height="50" rx="2" fill="#3b82f6" transform="rotate(-5, 24, 25)"/>
    <rect x="40" y="0" width="8" height="50" rx="2" fill="#22c55e" transform="rotate(5, 44, 25)"/>
    <rect x="60" y="0" width="8" height="50" rx="2" fill="#f59e0b" transform="rotate(15, 64, 25)"/>
    <rect x="80" y="0" width="8" height="50" rx="2" fill="#a855f7" transform="rotate(25, 84, 25)"/>
  </g>
</svg>
