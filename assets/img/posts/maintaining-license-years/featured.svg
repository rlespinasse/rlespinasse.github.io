<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Georgia', 'Times New Roman', serif">
  <rect width="800" height="500" fill="#2c3e50" rx="12"/>

  <!-- Document shadow -->
  <rect x="203" y="43" width="420" height="340" rx="4" fill="#1a252f"/>

  <!-- Document -->
  <rect x="190" y="30" width="420" height="340" rx="4" fill="#faf8f5" stroke="#d4c5a9" stroke-width="1.5"/>

  <!-- Document header -->
  <text x="400" y="72" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" font-family="'Courier New', monospace">MIT License</text>
  <line x1="240" y1="85" x2="560" y2="85" stroke="#d4c5a9" stroke-width="1"/>

  <!-- Copyright line with highlight -->
  <rect x="230" y="100" width="340" height="30" rx="4" fill="#fef3cd"/>
  <rect x="230" y="100" width="340" height="30" rx="4" fill="none" stroke="#f0c040" stroke-width="1.5"/>
  <text x="245" y="121" font-size="14" fill="#2c3e50" font-family="'Courier New', monospace">Copyright (c) <tspan font-weight="bold" fill="#b8860b">2019-2026</tspan> Author</text>

  <!-- License body lines (abbreviated) -->
  <g fill="#8a8a8a" font-size="10" font-family="'Courier New', monospace">
    <text x="245" y="155">Permission is hereby granted, free of</text>
    <text x="245" y="170">charge, to any person obtaining a copy</text>
    <text x="245" y="185">of this software and associated docs...</text>
    <text x="245" y="205">THE SOFTWARE IS PROVIDED "AS IS",</text>
    <text x="245" y="220">WITHOUT WARRANTY OF ANY KIND...</text>
    <rect x="245" y="235" width="300" height="8" rx="4" fill="#e8e4de"/>
    <rect x="245" y="250" width="280" height="8" rx="4" fill="#e8e4de"/>
    <rect x="245" y="265" width="310" height="8" rx="4" fill="#e8e4de"/>
    <rect x="245" y="280" width="250" height="8" rx="4" fill="#e8e4de"/>
    <rect x="245" y="295" width="290" height="8" rx="4" fill="#e8e4de"/>
    <rect x="245" y="310" width="200" height="8" rx="4" fill="#e8e4de"/>
    <rect x="245" y="325" width="260" height="8" rx="4" fill="#e8e4de"/>
    <rect x="245" y="340" width="180" height="8" rx="4" fill="#e8e4de"/>
  </g>

  <!-- Timeline bar -->
  <g transform="translate(115, 410)">
    <!-- Timeline track -->
    <rect x="0" y="15" width="570" height="6" rx="3" fill="#1a252f"/>
    <rect x="0" y="15" width="570" height="6" rx="3" fill="#3498db" opacity="0.3"/>

    <!-- Progress fill -->
    <rect x="0" y="15" width="570" height="6" rx="3" fill="url(#timeGrad)"/>

    <!-- Version markers -->
    <g font-size="13" font-family="'SF Mono', 'Courier New', monospace" font-weight="bold">
      <circle cx="0" cy="18" r="10" fill="#e74c3c"/>
      <text x="0" y="55" text-anchor="middle" fill="#bdc3c7">2019</text>
      <text x="0" y="-5" text-anchor="middle" fill="#ecf0f1" font-size="12">v1</text>

      <circle cx="142" cy="18" r="10" fill="#e67e22"/>
      <text x="142" y="55" text-anchor="middle" fill="#bdc3c7">2020</text>
      <text x="142" y="-5" text-anchor="middle" fill="#ecf0f1" font-size="12">v2</text>

      <circle cx="285" cy="18" r="10" fill="#f1c40f"/>
      <text x="285" y="55" text-anchor="middle" fill="#bdc3c7">2022</text>
      <text x="285" y="-5" text-anchor="middle" fill="#ecf0f1" font-size="12">v3</text>

      <circle cx="427" cy="18" r="10" fill="#2ecc71"/>
      <text x="427" y="55" text-anchor="middle" fill="#bdc3c7">2024</text>
      <text x="427" y="-5" text-anchor="middle" fill="#ecf0f1" font-size="12">v4</text>

      <circle cx="570" cy="18" r="12" fill="#3498db" stroke="#ecf0f1" stroke-width="2"/>
      <text x="570" y="55" text-anchor="middle" fill="#ecf0f1" font-weight="bold">2026</text>
      <text x="570" y="-5" text-anchor="middle" fill="#ecf0f1" font-size="12">v5</text>
    </g>
  </g>

  <defs>
    <linearGradient id="timeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="25%" stop-color="#e67e22"/>
      <stop offset="50%" stop-color="#f1c40f"/>
      <stop offset="75%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
  </defs>
</svg>