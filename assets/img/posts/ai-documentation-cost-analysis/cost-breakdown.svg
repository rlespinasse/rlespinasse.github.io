<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="800" height="400" fill="#0f172a" rx="8"/>

  <!-- Donut chart - token distribution -->
  <g transform="translate(200, 190)">
    <!-- Background ring -->
    <circle r="120" fill="none" stroke="#334155" stroke-width="40"
      stroke-dasharray="754" stroke-dashoffset="0"/>
    <!-- Cache read (93.8%) -->
    <circle r="120" fill="none" stroke="#3b82f6" stroke-width="40" opacity="0.4"
      stroke-dasharray="707 47" stroke-dashoffset="0"/>
    <!-- Cache write (5.9%) -->
    <circle r="120" fill="none" stroke="#22c55e" stroke-width="40" opacity="0.6"
      stroke-dasharray="44 710" stroke-dashoffset="-707"/>
    <!-- Output (0.3%) -->
    <circle r="120" fill="none" stroke="#f59e0b" stroke-width="40"
      stroke-dasharray="2 752" stroke-dashoffset="-751"/>

    <!-- Center text -->
    <text y="-10" text-anchor="middle" font-size="24" fill="#e2e8f0" font-weight="bold">127.6M</text>
    <text y="14" text-anchor="middle" font-size="12" fill="#64748b">tokens (proportional)</text>
    <text y="32" text-anchor="middle" font-size="11" fill="#93c5fd">docs attribution</text>
  </g>

  <!-- Legend with cost -->
  <g transform="translate(420, 80)">
    <rect width="16" height="16" rx="3" fill="#3b82f6" opacity="0.4"/>
    <text x="26" y="13" font-size="13" fill="#93c5fd">Cache read</text>
    <text x="260" y="13" font-size="13" fill="#64748b" text-anchor="end">119.7M tokens</text>
    <text x="350" y="13" font-size="13" fill="#94a3b8" text-anchor="end">$59.87</text>

    <g transform="translate(0, 36)">
      <rect width="16" height="16" rx="3" fill="#22c55e" opacity="0.6"/>
      <text x="26" y="13" font-size="13" fill="#86efac">Cache write</text>
      <text x="260" y="13" font-size="13" fill="#64748b" text-anchor="end">7.5M tokens</text>
      <text x="350" y="13" font-size="13" fill="#94a3b8" text-anchor="end">$46.77</text>
    </g>

    <g transform="translate(0, 72)">
      <rect width="16" height="16" rx="3" fill="#f59e0b"/>
      <text x="26" y="13" font-size="13" fill="#fcd34d">Output</text>
      <text x="260" y="13" font-size="13" fill="#64748b" text-anchor="end">356.3K tokens</text>
      <text x="350" y="13" font-size="13" fill="#94a3b8" text-anchor="end">$8.91</text>
    </g>

    <g transform="translate(0, 108)">
      <rect width="16" height="16" rx="3" fill="#a855f7"/>
      <text x="26" y="13" font-size="13" fill="#c084fc">Input</text>
      <text x="260" y="13" font-size="13" fill="#64748b" text-anchor="end">35.6K tokens</text>
      <text x="350" y="13" font-size="13" fill="#94a3b8" text-anchor="end">$0.18</text>
    </g>

    <!-- Divider -->
    <line x1="0" y1="140" x2="350" y2="140" stroke="#334155" stroke-width="1"/>

    <g transform="translate(0, 160)">
      <text x="26" y="13" font-size="14" fill="#e2e8f0" font-weight="bold">Total</text>
      <text x="350" y="13" font-size="14" fill="#e2e8f0" font-weight="bold" text-anchor="end">$115.73</text>
    </g>
  </g>

  <!-- Pricing source -->
  <text x="420" y="310" font-size="10" fill="#475569">Pricing: Claude Opus 4.6 (platform.claude.com/docs/en/about-claude/pricing)</text>
  <text x="420" y="325" font-size="10" fill="#475569">Input $5 / Output $25 / Cache write $6.25 / Cache read $0.50 per MTok</text>

  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" font-size="15" fill="#e2e8f0" font-weight="600">Where the Tokens Go (Proportional Attribution)</text>
</svg>
