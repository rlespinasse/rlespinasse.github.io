<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="800" height="400" fill="#0f172a" rx="8"/>

  <!-- Step 1: Extract -->
  <g transform="translate(30, 90)">
    <rect width="120" height="170" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <!-- Document with lines icon -->
    <g transform="translate(40, 20)">
      <rect x="0" y="0" width="30" height="38" rx="4" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
      <line x1="6" y1="10" x2="24" y2="10" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="6" y1="17" x2="20" y2="17" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="6" y1="24" x2="24" y2="24" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="6" y1="31" x2="16" y2="31" stroke="#3b82f6" stroke-width="1.5"/>
    </g>
    <text x="60" y="85" text-anchor="middle" font-size="13" fill="#93c5fd" font-weight="bold">Extract</text>
    <text x="60" y="102" text-anchor="middle" font-size="9" fill="#64748b">Parse every</text>
    <text x="60" y="114" text-anchor="middle" font-size="9" fill="#64748b">feature claim</text>
    <text x="60" y="126" text-anchor="middle" font-size="9" fill="#64748b">and sub-claim</text>
    <circle cx="60" cy="152" r="12" fill="#3b82f6"/>
    <text x="60" y="157" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">1</text>
  </g>

  <!-- Arrow 1-2 -->
  <g transform="translate(155, 170)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="20,-4 28,0 20,4" fill="#475569"/>
  </g>

  <!-- Step 2: Search -->
  <g transform="translate(185, 90)">
    <rect width="120" height="170" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <!-- Magnifying glass icon -->
    <g transform="translate(38, 18)">
      <circle cx="16" cy="16" r="14" fill="none" stroke="#22c55e" stroke-width="2.5"/>
      <line x1="26" y1="26" x2="36" y2="36" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="60" y="85" text-anchor="middle" font-size="13" fill="#86efac" font-weight="bold">Search</text>
    <text x="60" y="102" text-anchor="middle" font-size="9" fill="#64748b">Find matching</text>
    <text x="60" y="114" text-anchor="middle" font-size="9" fill="#64748b">code in source</text>
    <text x="60" y="126" text-anchor="middle" font-size="9" fill="#64748b">files and tests</text>
    <circle cx="60" cy="152" r="12" fill="#22c55e"/>
    <text x="60" y="157" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">2</text>
  </g>

  <!-- Arrow 2-3 -->
  <g transform="translate(310, 170)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="20,-4 28,0 20,4" fill="#475569"/>
  </g>

  <!-- Step 3: Classify -->
  <g transform="translate(340, 90)">
    <rect width="120" height="170" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <!-- Tag/label icon -->
    <g transform="translate(38, 18)">
      <path d="M0,10 L15,0 L35,0 L35,28 L15,28 Z" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
      <circle cx="26" cy="14" r="4" fill="#f59e0b"/>
    </g>
    <text x="60" y="85" text-anchor="middle" font-size="13" fill="#fcd34d" font-weight="bold">Classify</text>
    <text x="60" y="102" text-anchor="middle" font-size="9" fill="#64748b">Assign status:</text>
    <text x="60" y="114" text-anchor="middle" font-size="9" fill="#22c55e">confirmed</text>
    <text x="60" y="126" text-anchor="middle" font-size="9" fill="#f59e0b">partial / overstated</text>
    <text x="60" y="138" text-anchor="middle" font-size="9" fill="#ef4444">not found</text>
    <circle cx="60" cy="152" r="12" fill="#f59e0b"/>
    <text x="60" y="157" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">3</text>
  </g>

  <!-- Arrow 3-4 -->
  <g transform="translate(465, 170)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="20,-4 28,0 20,4" fill="#475569"/>
  </g>

  <!-- Step 4: Report -->
  <g transform="translate(495, 90)">
    <rect width="120" height="170" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <!-- Table icon -->
    <g transform="translate(38, 18)">
      <rect x="0" y="0" width="35" height="35" rx="4" fill="none" stroke="#a855f7" stroke-width="2.5"/>
      <line x1="0" y1="12" x2="35" y2="12" stroke="#a855f7" stroke-width="1.5"/>
      <line x1="0" y1="23" x2="35" y2="23" stroke="#a855f7" stroke-width="1.5"/>
      <line x1="14" y1="0" x2="14" y2="35" stroke="#a855f7" stroke-width="1.5"/>
    </g>
    <text x="60" y="85" text-anchor="middle" font-size="13" fill="#c084fc" font-weight="bold">Report</text>
    <text x="60" y="102" text-anchor="middle" font-size="9" fill="#64748b">Summary table</text>
    <text x="60" y="114" text-anchor="middle" font-size="9" fill="#64748b">with file paths</text>
    <text x="60" y="126" text-anchor="middle" font-size="9" fill="#64748b">and line numbers</text>
    <circle cx="60" cy="152" r="12" fill="#a855f7"/>
    <text x="60" y="157" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">4</text>
  </g>

  <!-- Arrow 4-5 -->
  <g transform="translate(620, 170)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="20,-4 28,0 20,4" fill="#475569"/>
  </g>

  <!-- Step 5: Suggest -->
  <g transform="translate(650, 90)">
    <rect width="120" height="170" rx="12" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <!-- Pencil/edit icon -->
    <g transform="translate(40, 18)">
      <path d="M5,30 L0,38 L8,33 L32,9 L28,5 Z" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="25" y1="8" x2="29" y2="12" stroke="#ec4899" stroke-width="2"/>
    </g>
    <text x="60" y="85" text-anchor="middle" font-size="13" fill="#f9a8d4" font-weight="bold">Suggest</text>
    <text x="60" y="102" text-anchor="middle" font-size="9" fill="#64748b">Propose doc</text>
    <text x="60" y="114" text-anchor="middle" font-size="9" fill="#64748b">edits to match</text>
    <text x="60" y="126" text-anchor="middle" font-size="9" fill="#64748b">reality</text>
    <circle cx="60" cy="152" r="12" fill="#ec4899"/>
    <text x="60" y="157" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">5</text>
  </g>

  <!-- Title -->
  <text x="400" y="330" text-anchor="middle" font-size="15" fill="#e2e8f0" font-weight="600">Verify README Features Workflow</text>
  <text x="400" y="355" text-anchor="middle" font-size="12" fill="#64748b">From claims to evidence-based verdicts</text>
</svg>
