        <rect x="120" y="2" width="50" height="14" rx="3" fill="#f59e0b" opacity="0.15"/>
        <text x="145" y="13" text-anchor="middle" font-size="9" fill="#f59e0b">partial</text>
      </g>

      <g transform="translate(0, 90)">
