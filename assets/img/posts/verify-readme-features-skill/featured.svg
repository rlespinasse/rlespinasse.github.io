    <text x="110" y="24" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="bold">README.md</text>

    <!-- Feature lines with status indicators -->
    <g transform="translate(16, 52)">
      <!-- Confirmed feature -->
      <circle cx="8" cy="8" r="6" fill="#22c55e" opacity="0.9"/>
      <path d="M5,8 L7,10 L11,5" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="22" y="3" width="130" height="10" rx="3" fill="#334155"/>
      <text x="24" y="12" font-size="9" fill="#94a3b8">Config-driven layers</text>

      <!-- Confirmed feature -->
      <g transform="translate(0, 28)">
        <circle cx="8" cy="8" r="6" fill="#22c55e" opacity="0.9"/>
        <path d="M5,8 L7,10 L11,5" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="22" y="3" width="150" height="10" rx="3" fill="#334155"/>
        <text x="24" y="12" font-size="9" fill="#94a3b8">Polygon click-through</text>
      </g>

      <!-- Partial feature -->
      <g transform="translate(0, 56)">
        <circle cx="8" cy="8" r="6" fill="#f59e0b" opacity="0.9"/>
        <rect x="4" y="6" width="8" height="4" rx="1" fill="#fff"/>
        <rect x="22" y="3" width="120" height="10" rx="3" fill="#334155"/>
        <text x="24" y="12" font-size="9" fill="#94a3b8">Tile thumbnails</text>
      </g>

      <!-- Overstated feature -->
      <g transform="translate(0, 84)">
        <circle cx="8" cy="8" r="6" fill="#f97316" opacity="0.9"/>
        <text x="8" y="11.5" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">!</text>
        <rect x="22" y="3" width="140" height="10" rx="3" fill="#334155"/>
        <text x="24" y="12" font-size="9" fill="#94a3b8">Plugin system</text>
      </g>

      <!-- Not found feature -->
      <g transform="translate(0, 112)">
        <circle cx="8" cy="8" r="6" fill="#ef4444" opacity="0.9"/>
        <path d="M5,5 L11,11 M11,5 L5,11" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="22" y="3" width="110" height="10" rx="3" fill="#334155"/>
        <text x="24" y="12" font-size="9" fill="#94a3b8">Dark mode</text>
      </g>

      <!-- Confirmed feature -->
      <g transform="translate(0, 140)">
        <circle cx="8" cy="8" r="6" fill="#22c55e" opacity="0.9"/>
        <path d="M5,8 L7,10 L11,5" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="22" y="3" width="160" height="10" rx="3" fill="#334155"/>
        <text x="24" y="12" font-size="9" fill="#94a3b8">Searchable filter bar</text>
      </g>

      <!-- Confirmed feature -->
      <g transform="translate(0, 168)">
        <circle cx="8" cy="8" r="6" fill="#22c55e" opacity="0.9"/>
        <path d="M5,8 L7,10 L11,5" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="22" y="3" width="100" height="10" rx="3" fill="#334155"/>
        <text x="24" y="12" font-size="9" fill="#94a3b8">XSS prevention</text>
      </g>
