        <line x1="4" y1="5" x2="12" y2="5" stroke="#3b82f6" stroke-width="1"/>
        <line x1="4" y1="9" x2="10" y2="9" stroke="#3b82f6" stroke-width="1"/>
        <line x1="4" y1="13" x2="12" y2="13" stroke="#3b82f6" stroke-width="1"/>
        <text x="22" y="13" font-size="10" fill="#94a3b8">src/filter.js</text>
        <rect x="120" y="2" width="50" height="14" rx="3" fill="#22c55e" opacity="0.15"/>
        <text x="145" y="13" text-anchor="middle" font-size="9" fill="#22c55e">found</text>
      </g>

      <g transform="translate(0, 180)">
        <rect x="0" y="0" width="16" height="18" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
        <line x1="4" y1="5" x2="12" y2="5" stroke="#3b82f6" stroke-width="1"/>
        <line x1="4" y1="9" x2="10" y2="9" stroke="#3b82f6" stroke-width="1"/>
        <line x1="4" y1="13" x2="12" y2="13" stroke="#3b82f6" stroke-width="1"/>
        <text x="22" y="13" font-size="10" fill="#94a3b8">src/sanitize.js</text>
        <rect x="120" y="2" width="50" height="14" rx="3" fill="#22c55e" opacity="0.15"/>
        <text x="145" y="13" text-anchor="middle" font-size="9" fill="#22c55e">found</text>
