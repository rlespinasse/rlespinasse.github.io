        <line x1="4" y1="5" x2="12" y2="5" stroke="#3b82f6" stroke-width="1"/>
        <line x1="4" y1="9" x2="10" y2="9" stroke="#3b82f6" stroke-width="1"/>
        <line x1="4" y1="13" x2="12" y2="13" stroke="#3b82f6" stroke-width="1"/>
