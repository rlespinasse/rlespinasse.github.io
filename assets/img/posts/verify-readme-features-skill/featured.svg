  <!-- Legend -->
  <g transform="translate(185, 410)">
    <circle cx="8" cy="8" r="6" fill="#22c55e" opacity="0.9"/>
    <text x="20" y="12" font-size="10" fill="#94a3b8">Confirmed</text>

    <g transform="translate(100, 0)">
      <circle cx="8" cy="8" r="6" fill="#f59e0b" opacity="0.9"/>
