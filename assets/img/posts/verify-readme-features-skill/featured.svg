        <line x1="4" y1="5" x2="12" y2="5" stroke="#3b82f6" stroke-width="1"/>
        <line x1="4" y1="9" x2="10" y2="9" stroke="#3b82f6" stroke-width="1"/>
        <line x1="4" y1="13" x2="12" y2="13" stroke="#3b82f6" stroke-width="1"/>
        <text x="22" y="13" font-size="10" fill="#94a3b8">src/plugin.js</text>
        <rect x="120" y="2" width="70" height="14" rx="3" fill="#f97316" opacity="0.15"/>
        <text x="155" y="13" text-anchor="middle" font-size="9" fill="#f97316">overstated</text>
      </g>

      <g transform="translate(0, 120)">
