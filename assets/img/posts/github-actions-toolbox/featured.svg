<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'SF Mono', 'Fira Code', monospace">
  <rect width="800" height="500" fill="#0d1117" rx="12"/>

  <!-- Terminal window -->
  <g transform="translate(50, 30)">
    <!-- Window chrome -->
    <rect width="700" height="440" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <rect width="700" height="36" rx="10" fill="#21262d"/>
    <rect y="26" width="700" height="10" fill="#21262d"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="350" y="22" text-anchor="middle" font-size="12" fill="#8b949e">ghat — Terminal</text>

    <!-- Command prompt -->
    <text x="20" y="65" font-size="13" fill="#8b949e">$</text>
    <text x="35" y="65" font-size="13" fill="#c9d1d9"><tspan fill="#58a6ff" font-weight="bold">ghat dependents</tspan> \</text>
    <text x="55" y="85" font-size="13" fill="#c9d1d9">rlespinasse/github-slug-action \</text>
    <text x="55" y="105" font-size="13" fill="#c9d1d9">rlespinasse/drawio-export-action \</text>
    <text x="55" y="125" font-size="13" fill="#c9d1d9">rlespinasse/release-that</text>

    <!-- Separator -->
    <line x1="20" y1="140" x2="680" y2="140" stroke="#30363d" stroke-width="1"/>

    <!-- Table header -->
    <text x="20" y="165" font-size="13" fill="#58a6ff" font-weight="bold">REPOSITORY</text>
    <text x="480" y="165" font-size="13" fill="#58a6ff" font-weight="bold">DEPENDENTS</text>
    <line x1="20" y1="175" x2="680" y2="175" stroke="#30363d" stroke-width="1"/>

    <!-- Table rows -->
    <text x="20" y="200" font-size="13" fill="#c9d1d9">rlespinasse/github-slug-action</text>
    <text x="480" y="200" font-size="13" fill="#3fb950" font-weight="bold">18,158</text>

    <text x="20" y="230" font-size="13" fill="#c9d1d9">rlespinasse/drawio-export-action</text>
    <text x="480" y="230" font-size="13" fill="#3fb950" font-weight="bold">122</text>

    <text x="20" y="260" font-size="13" fill="#c9d1d9">rlespinasse/release-that</text>
    <text x="480" y="260" font-size="13" fill="#3fb950" font-weight="bold">34</text>

    <line x1="20" y1="280" x2="680" y2="280" stroke="#30363d" stroke-width="1"/>

    <!-- Summary -->
    <text x="20" y="305" font-size="13" fill="#8b949e">Total:</text>
    <text x="480" y="305" font-size="13" fill="#f0e68c" font-weight="bold">18,314</text>

    <!-- Next prompt -->
    <text x="20" y="350" font-size="13" fill="#8b949e">$</text>
    <rect x="35" y="338" width="9" height="16" fill="#58a6ff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- ghat logo text -->
    <text x="350" y="410" text-anchor="middle" font-size="20" fill="#58a6ff" font-weight="bold">ghat</text>
    <text x="350" y="430" text-anchor="middle" font-size="12" fill="#484f58">GitHub Actions Toolbox</text>
  </g>
</svg>
