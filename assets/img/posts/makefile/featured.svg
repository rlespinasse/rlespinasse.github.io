<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- ============================================================ -->
  <!-- TITLE -->
  <!-- ============================================================ -->
  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#f0f6fc" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="0.5">Makefile</text>
  <text x="400" y="64" text-anchor="middle" font-size="12" fill="#8b949e" font-family="'Segoe UI', Arial, sans-serif">Guard Patterns &amp; Wrappers</text>
  <line x1="315" y1="74" x2="485" y2="74" stroke="#10b981" stroke-width="1" opacity="0.4"/>

  <!-- ============================================================ -->
  <!-- LEFT PANEL: Makefile code block -->
  <!-- ============================================================ -->
  <g transform="translate(28, 90)">
    <!-- Card shadow -->
    <rect x="4" y="4" width="350" height="330" rx="8" fill="#000000" opacity="0.5"/>
    <!-- Card body -->
    <rect width="350" height="330" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

    <!-- Header bar -->
    <rect width="350" height="32" rx="8" fill="#21262d"/>
    <rect y="24" width="350" height="8" fill="#21262d"/>
    <!-- Dots -->
    <circle cx="16" cy="16" r="5" fill="#f87171" opacity="0.8"/>
    <circle cx="36" cy="16" r="5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="56" cy="16" r="5" fill="#4ade80" opacity="0.8"/>
    <!-- File label -->
    <text x="175" y="20" text-anchor="middle" font-size="11" fill="#8b949e">Makefile</text>

    <!-- Code content -->
    <!-- Line 1: guard-% target -->
    <text x="20" y="58" font-size="12">
      <tspan fill="#79c0ff" font-weight="600">guard-%</tspan><tspan fill="#c9d1d9">:</tspan>
    </text>
    <!-- Line 2: conditional check -->
    <text x="20" y="77" font-size="12">
      <tspan fill="#8b949e">  @[ </tspan><tspan fill="#f2cc60">"${$*}"</tspan><tspan fill="#8b949e"> ] || \</tspan>
    </text>
    <!-- Line 3: echo error -->
    <text x="20" y="96" font-size="12">
      <tspan fill="#8b949e">    (echo </tspan><tspan fill="#a5d6ff">"ERROR: $* not set"</tspan><tspan fill="#8b949e">; \</tspan>
    </text>
    <!-- Line 4: exit -->
    <text x="20" y="115" font-size="12">
      <tspan fill="#8b949e">     exit </tspan><tspan fill="#f2cc60">1</tspan><tspan fill="#8b949e">)</tspan>
    </text>

    <!-- Blank spacer line -->
    <text x="20" y="134" font-size="12" fill="#30363d">&#160;</text>

    <!-- deploy target -->
    <text x="20" y="153" font-size="12">
      <tspan fill="#79c0ff" font-weight="600">deploy</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#f2cc60">guard-ENV</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#f2cc60">guard-VERSION</tspan>
    </text>
    <!-- deploy body line 1 -->
    <text x="20" y="172" font-size="12">
      <tspan fill="#8b949e">  @echo </tspan><tspan fill="#a5d6ff">"Deploying </tspan><tspan fill="#f2cc60">$(VERSION)</tspan><tspan fill="#a5d6ff">"</tspan>
    </text>
    <!-- deploy body line 2 -->
    <text x="20" y="191" font-size="12">
      <tspan fill="#8b949e">  @echo </tspan><tspan fill="#a5d6ff">"  to </tspan><tspan fill="#f2cc60">$(ENV)</tspan><tspan fill="#a5d6ff">"</tspan>
    </text>

    <!-- Divider -->
    <line x1="20" y1="206" x2="330" y2="206" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- second target example: release -->
    <text x="20" y="225" font-size="12">
      <tspan fill="#79c0ff" font-weight="600">release</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#f2cc60">guard-VERSION</tspan>
    </text>
    <text x="20" y="244" font-size="12">
      <tspan fill="#8b949e">  @echo </tspan><tspan fill="#a5d6ff">"Releasing v</tspan><tspan fill="#f2cc60">$(VERSION)</tspan><tspan fill="#a5d6ff">"</tspan>
    </text>

    <!-- Comment block -->
    <text x="20" y="270" font-size="11" fill="#6e7681"># Usage: make deploy ENV=prod VERSION=1.2.0</text>
    <text x="20" y="286" font-size="11" fill="#6e7681"># Usage: make release VERSION=2.0.0</text>

    <!-- Pattern annotation badge -->
    <rect x="20" y="302" width="90" height="18" rx="9" fill="#1f2e1f" stroke="#3fb950" stroke-width="1"/>
    <text x="65" y="315" text-anchor="middle" font-size="9" fill="#3fb950">guard pattern</text>
    <rect x="118" y="302" width="70" height="18" rx="9" fill="#1e2840" stroke="#58a6ff" stroke-width="1"/>
    <text x="153" y="315" text-anchor="middle" font-size="9" fill="#79c0ff">wrapper</text>
    <rect x="196" y="302" width="80" height="18" rx="9" fill="#2a1f0e" stroke="#f2cc60" stroke-width="1"/>
    <text x="236" y="315" text-anchor="middle" font-size="9" fill="#f2cc60">variables</text>
  </g>

  <!-- ============================================================ -->
  <!-- CENTER DIVIDER with arrow -->
  <!-- ============================================================ -->
  <line x1="400" y1="95" x2="400" y2="415" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <!-- Arrow pointing right -->
  <g transform="translate(400, 255)">
    <circle r="18" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="-6,-5 6,0 -6,5" fill="#58a6ff"/>
  </g>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE: Two terminal output stacks -->
  <!-- ============================================================ -->

  <!-- TOP: FAILURE terminal -->
  <g transform="translate(422, 90)">
    <!-- Shadow -->
    <rect x="4" y="4" width="350" height="148" rx="8" fill="#000000" opacity="0.5"/>
    <!-- Card body (red tint) -->
    <rect width="350" height="148" rx="8" fill="#1a0e0e" stroke="#f85149" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect width="350" height="30" rx="8" fill="#2d1010"/>
    <rect y="22" width="350" height="8" fill="#2d1010"/>
    <!-- Dots -->
    <circle cx="16" cy="15" r="5" fill="#f87171" opacity="0.9"/>
    <circle cx="36" cy="15" r="5" fill="#fbbf24" opacity="0.5"/>
    <circle cx="56" cy="15" r="5" fill="#4ade80" opacity="0.5"/>
    <!-- Status label -->
    <rect x="276" y="8" width="62" height="14" rx="7" fill="#f8514920" stroke="#f85149" stroke-width="1"/>
    <text x="307" y="19" text-anchor="middle" font-size="9" fill="#f85149">FAILURE</text>

    <!-- Terminal content -->
    <text x="20" y="54" font-size="12">
      <tspan fill="#8b949e">$ </tspan><tspan fill="#c9d1d9">make deploy</tspan>
    </text>
    <text x="20" y="74" font-size="12" fill="#f85149" filter="url(#glow)">ERROR: ENV not set</text>
    <text x="20" y="94" font-size="12">
      <tspan fill="#f85149">make</tspan><tspan fill="#8b949e">: *** [guard-ENV] </tspan><tspan fill="#f85149">Error 1</tspan>
    </text>

    <!-- Divider -->
    <line x1="20" y1="108" x2="330" y2="108" stroke="#3d1515" stroke-width="1"/>

    <!-- Explanation -->
    <text x="20" y="127" font-size="11" fill="#8b949e">Missing required variable: </text>
    <text x="188" y="127" font-size="11" fill="#f2cc60">ENV</text>
    <text x="20" y="142" font-size="11" fill="#6e7681">Guard stops execution before any damage.</text>
  </g>

  <!-- TOP arrow label -->
  <text x="597" y="88" text-anchor="middle" font-size="9" fill="#8b949e">no ENV set</text>

  <!-- Spacer -->

  <!-- BOTTOM: SUCCESS terminal -->
  <g transform="translate(422, 262)">
    <!-- Shadow -->
    <rect x="4" y="4" width="350" height="160" rx="8" fill="#000000" opacity="0.5"/>
    <!-- Card body (green tint) -->
    <rect width="350" height="160" rx="8" fill="#0a1a0f" stroke="#3fb950" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect width="350" height="30" rx="8" fill="#0d2010"/>
    <rect y="22" width="350" height="8" fill="#0d2010"/>
    <!-- Dots -->
    <circle cx="16" cy="15" r="5" fill="#f87171" opacity="0.5"/>
    <circle cx="36" cy="15" r="5" fill="#fbbf24" opacity="0.5"/>
    <circle cx="56" cy="15" r="5" fill="#4ade80" opacity="0.9"/>
    <!-- Status label -->
    <rect x="272" y="8" width="66" height="14" rx="7" fill="#3fb95020" stroke="#3fb950" stroke-width="1"/>
    <text x="305" y="19" text-anchor="middle" font-size="9" fill="#3fb950">SUCCESS</text>

    <!-- Terminal content -->
    <text x="20" y="54" font-size="12">
      <tspan fill="#8b949e">$ </tspan><tspan fill="#c9d1d9">make deploy ENV</tspan><tspan fill="#8b949e">=</tspan><tspan fill="#3fb950">prod</tspan><tspan fill="#c9d1d9"> VERSION</tspan><tspan fill="#8b949e">=</tspan><tspan fill="#3fb950">1.2.0</tspan>
    </text>
    <text x="20" y="74" font-size="12">
      <tspan fill="#3fb950">Deploying </tspan><tspan fill="#f2cc60">1.2.0</tspan>
    </text>
    <text x="20" y="94" font-size="12">
      <tspan fill="#3fb950">  to </tspan><tspan fill="#f2cc60">prod</tspan>
    </text>

    <!-- Divider -->
    <line x1="20" y1="108" x2="330" y2="108" stroke="#0d2010" stroke-width="1"/>

    <!-- Explanation -->
    <text x="20" y="127" font-size="11" fill="#8b949e">Both guards passed: </text>
    <text x="143" y="127" font-size="11" fill="#f2cc60">ENV</text>
    <text x="170" y="127" font-size="11" fill="#8b949e"> and </text>
    <text x="202" y="127" font-size="11" fill="#f2cc60">VERSION</text>
    <text x="258" y="127" font-size="11" fill="#8b949e"> are set.</text>
    <text x="20" y="143" font-size="11" fill="#6e7681">Deployment proceeds safely to production.</text>
  </g>

  <!-- ============================================================ -->
  <!-- BOTTOM: Summary bar -->
  <!-- ============================================================ -->
  <g transform="translate(28, 440)">
    <rect width="744" height="42" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <!-- Left: pattern description -->
    <text x="20" y="17" font-size="10" fill="#8b949e">Pattern:</text>
    <text x="62" y="17" font-size="10" fill="#79c0ff">guard-%</text>
    <text x="108" y="17" font-size="10" fill="#8b949e">validates required env vars before targets run</text>
    <!-- Divider -->
    <line x1="380" y1="8" x2="380" y2="34" stroke="#30363d" stroke-width="1"/>
    <!-- Right: dependency notation -->
    <text x="394" y="17" font-size="10" fill="#8b949e">Deps:</text>
    <text x="428" y="17" font-size="10">
      <tspan fill="#79c0ff">deploy</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#f2cc60">guard-ENV</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#f2cc60">guard-VERSION</tspan>
    </text>
    <!-- Second row -->
    <text x="20" y="33" font-size="10" fill="#6e7681">Works with any variable — reusable, composable, zero dependencies.</text>
  </g>
</svg>
