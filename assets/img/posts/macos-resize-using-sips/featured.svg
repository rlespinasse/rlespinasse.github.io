<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="macTitleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>
    <linearGradient id="imgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b9bd5"/>
      <stop offset="30%" stop-color="#70c1b3"/>
      <stop offset="60%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#e76f51"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="thumbShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <pattern id="imgPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#5b9bd5" opacity="0.3"/>
      <rect x="10" y="10" width="10" height="10" fill="#5b9bd5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f0f0f5" rx="8"/>

  <!-- macOS window -->
  <rect x="30" y="20" width="740" height="460" rx="10" fill="#ffffff" filter="url(#shadow)" stroke="#c8c8c8" stroke-width="0.5"/>

  <!-- Title bar -->
  <rect x="30" y="20" width="740" height="36" rx="10" fill="url(#macTitleBar)"/>
  <rect x="30" y="46" width="740" height="10" fill="url(#macTitleBar)"/>

  <!-- Window dots -->
  <circle cx="56" cy="38" r="6.5" fill="#ff5f57" stroke="#e0443e" stroke-width="0.5"/>
  <circle cx="78" cy="38" r="6.5" fill="#febc2e" stroke="#dea123" stroke-width="0.5"/>
  <circle cx="100" cy="38" r="6.5" fill="#28c840" stroke="#1aab29" stroke-width="0.5"/>

  <!-- Title -->
  <text x="400" y="43" text-anchor="middle" fill="#4d4d4d" font-size="13" font-weight="500">Finder - assets/products</text>

  <!-- Content area background -->
  <rect x="30" y="56" width="740" height="344" fill="#ffffff"/>

  <!-- Image 1 - Large (800px) -->
  <g transform="translate(75, 100)">
    <rect x="0" y="0" width="150" height="150" rx="8" fill="url(#imgGrad)" filter="url(#thumbShadow)"/>
    <!-- Mountain scene -->
    <polygon points="15,130 55,60 95,130" fill="rgba(255,255,255,0.3)"/>
    <polygon points="70,130 100,75 140,130" fill="rgba(255,255,255,0.2)"/>
    <circle cx="120" cy="40" r="18" fill="rgba(255,255,255,0.4)"/>
    <!-- Label -->
    <text x="75" y="175" text-anchor="middle" fill="#333" font-size="14" font-weight="600">800px</text>
    <text x="75" y="193" text-anchor="middle" fill="#888" font-size="11">Original</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(255, 155)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="60,-7 75,0 60,7" fill="#5856d6"/>
    <text x="37" y="-12" text-anchor="middle" fill="#5856d6" font-size="11" font-weight="600">sips -Z</text>
  </g>

  <!-- Image 2 - Medium (400px) -->
  <g transform="translate(360, 125)">
    <rect x="0" y="0" width="100" height="100" rx="6" fill="url(#imgGrad)" filter="url(#thumbShadow)"/>
    <polygon points="10,85 37,40 63,85" fill="rgba(255,255,255,0.3)"/>
    <polygon points="47,85 67,50 93,85" fill="rgba(255,255,255,0.2)"/>
    <circle cx="80" cy="27" r="12" fill="rgba(255,255,255,0.4)"/>
    <text x="50" y="125" text-anchor="middle" fill="#333" font-size="14" font-weight="600">400px</text>
    <text x="50" y="143" text-anchor="middle" fill="#888" font-size="11">Resized</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(490, 155)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="60,-7 75,0 60,7" fill="#5856d6"/>
    <text x="37" y="-12" text-anchor="middle" fill="#5856d6" font-size="11" font-weight="600">sips -Z</text>
  </g>

  <!-- Image 3 - Small (200px) -->
  <g transform="translate(600, 150)">
    <rect x="0" y="0" width="60" height="60" rx="4" fill="url(#imgGrad)" filter="url(#thumbShadow)"/>
    <polygon points="6,50 20,25 38,50" fill="rgba(255,255,255,0.3)"/>
    <polygon points="28,50 40,30 56,50" fill="rgba(255,255,255,0.2)"/>
    <circle cx="48" cy="16" r="8" fill="rgba(255,255,255,0.4)"/>
    <text x="30" y="80" text-anchor="middle" fill="#333" font-size="14" font-weight="600">200px</text>
    <text x="30" y="98" text-anchor="middle" fill="#888" font-size="11">Thumbnail</text>
  </g>

  <!-- Size indicator lines -->
  <g opacity="0.4">
    <line x1="75" y1="310" x2="225" y2="310" stroke="#007aff" stroke-width="1.5"/>
    <line x1="75" y1="305" x2="75" y2="315" stroke="#007aff" stroke-width="1.5"/>
    <line x1="225" y1="305" x2="225" y2="315" stroke="#007aff" stroke-width="1.5"/>

    <line x1="360" y1="310" x2="460" y2="310" stroke="#007aff" stroke-width="1.5"/>
    <line x1="360" y1="305" x2="360" y2="315" stroke="#007aff" stroke-width="1.5"/>
    <line x1="460" y1="305" x2="460" y2="315" stroke="#007aff" stroke-width="1.5"/>

    <line x1="600" y1="310" x2="660" y2="310" stroke="#007aff" stroke-width="1.5"/>
    <line x1="600" y1="305" x2="600" y2="315" stroke="#007aff" stroke-width="1.5"/>
    <line x1="660" y1="305" x2="660" y2="315" stroke="#007aff" stroke-width="1.5"/>
  </g>

  <!-- Terminal snippet at bottom -->
  <rect x="60" y="400" width="680" height="60" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <text x="80" y="422" fill="#a6e3a1" font-size="13" font-family="'SF Mono', 'Fira Code', monospace" font-weight="bold">$</text>
  <text x="98" y="422" fill="#cdd6f4" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">find . -name "*.png" -exec sh -c '</text>
  <text x="98" y="444" fill="#f9e2af" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">  sips -Z 200 "$1" --out "${1%.png}_200px.png"</text>
  <text x="570" y="444" fill="#cdd6f4" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">' _ {} \;</text>
</svg>