<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="800" height="500" fill="#0d1117" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-size="28" fill="#e2e8f0" font-weight="700">pin-github-actions</text>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#8b949e">Automating SHA pinning with AI assistants</text>

  <!-- 5-step workflow -->
  <g transform="translate(30, 115)">
    <!-- Step 1: Discover -->
    <g transform="translate(0, 0)">
      <rect width="120" height="105" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
      <g transform="translate(45, 18)">
        <circle cx="15" cy="15" r="13" fill="none" stroke="#58a6ff" stroke-width="2"/>
        <line x1="24" y1="24" x2="33" y2="33" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <text x="60" y="62" text-anchor="middle" font-size="13" fill="#93c5fd" font-weight="bold">Discover</text>
      <text x="60" y="78" text-anchor="middle" font-size="9" fill="#64748b">Scan workflows</text>
      <text x="60" y="91" text-anchor="middle" font-size="9" fill="#64748b">for uses: refs</text>
      <circle cx="60" cy="128" r="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="60" y="132" text-anchor="middle" font-size="10" fill="#58a6ff" font-weight="bold">1</text>
    </g>

    <!-- Arrow -->
    <line x1="128" y1="52" x2="148" y2="52" stroke="#30363d" stroke-width="2" marker-end="url(#stepArrow)"/>

    <!-- Step 2: Resolve -->
    <g transform="translate(155, 0)">
      <rect width="120" height="105" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
      <g transform="translate(42, 14)">
        <rect x="0" y="0" width="36" height="28" rx="4" fill="none" stroke="#58a6ff" stroke-width="2"/>
        <line x1="8" y1="10" x2="28" y2="10" stroke="#58a6ff" stroke-width="1.5"/>
        <line x1="8" y1="18" x2="22" y2="18" stroke="#58a6ff" stroke-width="1.5"/>
      </g>
      <text x="60" y="62" text-anchor="middle" font-size="13" fill="#93c5fd" font-weight="bold">Resolve</text>
      <text x="60" y="78" text-anchor="middle" font-size="9" fill="#64748b">API lookup +</text>
      <text x="60" y="91" text-anchor="middle" font-size="9" fill="#64748b">tag dereference</text>
      <circle cx="60" cy="128" r="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="60" y="132" text-anchor="middle" font-size="10" fill="#58a6ff" font-weight="bold">2</text>
    </g>

    <!-- Arrow -->
    <line x1="283" y1="52" x2="303" y2="52" stroke="#30363d" stroke-width="2" marker-end="url(#stepArrow)"/>

    <!-- Step 3: Pin -->
    <g transform="translate(310, 0)">
      <rect width="120" height="105" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
      <g transform="translate(42, 12)">
        <rect x="5" y="14" width="26" height="20" rx="4" fill="none" stroke="#3fb950" stroke-width="2"/>
        <path d="M10,14 V8 A8,8 0 0,1 26,8 V14" fill="none" stroke="#3fb950" stroke-width="2"/>
        <circle cx="18" cy="24" r="3" fill="#3fb950"/>
      </g>
      <text x="60" y="62" text-anchor="middle" font-size="13" fill="#86efac" font-weight="bold">Pin</text>
      <text x="60" y="78" text-anchor="middle" font-size="9" fill="#64748b">Replace tags</text>
      <text x="60" y="91" text-anchor="middle" font-size="9" fill="#64748b">with SHA # vX.Y</text>
      <circle cx="60" cy="128" r="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
      <text x="60" y="132" text-anchor="middle" font-size="10" fill="#3fb950" font-weight="bold">3</text>
    </g>

    <!-- Arrow -->
    <line x1="438" y1="52" x2="458" y2="52" stroke="#30363d" stroke-width="2" marker-end="url(#stepArrow)"/>

    <!-- Step 4: Dependabot -->
    <g transform="translate(465, 0)">
      <rect width="120" height="105" rx="8" fill="#161b22" stroke="#f59e0b" stroke-width="1.5"/>
      <g transform="translate(42, 14)">
        <circle cx="18" cy="12" r="10" fill="none" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="12" cy="10" r="2" fill="#f59e0b"/>
        <circle cx="24" cy="10" r="2" fill="#f59e0b"/>
        <path d="M12,17 Q18,22 24,17" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
      </g>
      <text x="60" y="62" text-anchor="middle" font-size="12" fill="#fcd34d" font-weight="bold">Dependabot</text>
      <text x="60" y="78" text-anchor="middle" font-size="9" fill="#64748b">Configure with</text>
      <text x="60" y="91" text-anchor="middle" font-size="9" fill="#64748b">grouped updates</text>
      <circle cx="60" cy="128" r="10" fill="#161b22" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="60" y="132" text-anchor="middle" font-size="10" fill="#f59e0b" font-weight="bold">4</text>
    </g>

    <!-- Arrow -->
    <line x1="593" y1="52" x2="613" y2="52" stroke="#30363d" stroke-width="2" marker-end="url(#stepArrow)"/>

    <!-- Step 5: Confirm -->
    <g transform="translate(620, 0)">
      <rect width="120" height="105" rx="8" fill="#161b22" stroke="#a855f7" stroke-width="1.5"/>
      <g transform="translate(42, 14)">
        <circle cx="18" cy="14" r="12" fill="none" stroke="#a855f7" stroke-width="2"/>
        <path d="M10,14 L16,20 L26,8" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="60" y="62" text-anchor="middle" font-size="13" fill="#c084fc" font-weight="bold">Confirm</text>
      <text x="60" y="78" text-anchor="middle" font-size="9" fill="#64748b">Review every</text>
      <text x="60" y="91" text-anchor="middle" font-size="9" fill="#64748b">change before apply</text>
      <circle cx="60" cy="128" r="10" fill="#161b22" stroke="#a855f7" stroke-width="1.5"/>
      <text x="60" y="132" text-anchor="middle" font-size="10" fill="#a855f7" font-weight="bold">5</text>
    </g>
  </g>

  <!-- Before/After example -->
  <g transform="translate(30, 280)">
    <!-- Before -->
    <rect width="320" height="85" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="15" y="22" font-size="10" fill="#f85149" font-weight="bold" font-family="sans-serif">Before</text>
    <text x="15" y="45" font-size="11" fill="#8b949e" font-family="'SF Mono', monospace">- uses: actions/checkout<tspan fill="#f85149">@v4</tspan></text>
    <text x="15" y="63" font-size="11" fill="#8b949e" font-family="'SF Mono', monospace">- uses: actions/setup-node<tspan fill="#f85149">@v4</tspan></text>
    <text x="15" y="78" font-size="9" fill="#484f58" font-family="sans-serif">⚠ Mutable tags — supply chain risk</text>

    <!-- Arrow -->
    <g transform="translate(340, 30)">
      <line x1="0" y1="0" x2="28" y2="0" stroke="#58a6ff" stroke-width="2.5"/>
      <polygon points="28,-5 38,0 28,5" fill="#58a6ff"/>
    </g>

    <!-- After -->
    <g transform="translate(395, 0)">
      <rect width="345" height="85" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
      <text x="15" y="22" font-size="10" fill="#3fb950" font-weight="bold" font-family="sans-serif">After</text>
      <text x="15" y="45" font-size="11" font-family="'SF Mono', monospace">
        <tspan fill="#8b949e">- uses: actions/checkout</tspan><tspan fill="#3fb950">@11bd71...</tspan><tspan fill="#484f58"> # v4.2.2</tspan>
      </text>
      <text x="15" y="63" font-size="11" font-family="'SF Mono', monospace">
        <tspan fill="#8b949e">- uses: actions/setup-node</tspan><tspan fill="#3fb950">@1e60f...</tspan><tspan fill="#484f58"> # v4.2.0</tspan>
      </text>
      <text x="15" y="78" font-size="9" fill="#484f58" font-family="sans-serif">🔒 Immutable SHAs — secure by design</text>
    </g>
  </g>

  <!-- Bottom: features -->
  <g transform="translate(50, 400)">
    <rect width="220" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="110" y="25" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="bold">⚡ Major version detection</text>
    <text x="110" y="43" text-anchor="middle" font-size="9" fill="#64748b">Flags v3 → v4 jumps</text>
    <text x="110" y="57" text-anchor="middle" font-size="9" fill="#64748b">Links to changelog</text>

    <g transform="translate(240, 0)">
      <rect width="220" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="110" y="25" text-anchor="middle" font-size="11" fill="#58a6ff" font-weight="bold">📦 Multi-ecosystem</text>
      <text x="110" y="43" text-anchor="middle" font-size="9" fill="#64748b">npm, Go, Docker, Terraform</text>
      <text x="110" y="57" text-anchor="middle" font-size="9" fill="#64748b">All in one Dependabot config</text>
    </g>

    <g transform="translate(480, 0)">
      <rect width="220" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="110" y="25" text-anchor="middle" font-size="11" fill="#a855f7" font-weight="bold">🧪 7 eval scenarios</text>
      <text x="110" y="43" text-anchor="middle" font-size="9" fill="#64748b">Consistent results across</text>
      <text x="110" y="57" text-anchor="middle" font-size="9" fill="#64748b">all AI assistants</text>
    </g>
  </g>

  <!-- AI sparkle badge (top-right corner) -->
  <g transform="translate(755, 40)">
    <path d="M0,-16 L3.5,-5.5 L16,0 L3.5,5.5 L0,16 L-3.5,5.5 L-16,0 L-3.5,-5.5 Z" fill="#fbbf24" opacity="0.8"/>
    <circle r="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text y="28" text-anchor="middle" font-size="8" fill="#f59e0b" font-weight="bold">AI Skill</text>
  </g>

  <defs>
    <marker id="stepArrow" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#30363d"/>
    </marker>
  </defs>
</svg>
