<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="monospace">
  <rect width="800" height="500" fill="#1a1a2e" rx="12"/>

  <!-- Circular arrow path -->
  <g transform="translate(400,250)">
    <!-- Dashed circle path -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#4a4a6a" stroke-width="2" stroke-dasharray="8,6" opacity="0.5"/>

    <!-- Curved arrows going in circle -->
    <g fill="none" stroke="#e94560" stroke-width="3" opacity="0.7">
      <path d="M 0,-150 A 150,150 0 0,1 130,-75" marker-end="url(#arrowhead)"/>
      <path d="M 130,-75 A 150,150 0 0,1 130,75" marker-end="url(#arrowhead)"/>
      <path d="M 130,75 A 150,150 0 0,1 0,150" marker-end="url(#arrowhead)"/>
      <path d="M 0,150 A 150,150 0 0,1 -130,75" marker-end="url(#arrowhead)"/>
      <path d="M -130,75 A 150,150 0 0,1 -130,-75" marker-end="url(#arrowhead)"/>
      <path d="M -130,-75 A 150,150 0 0,1 0,-150" marker-end="url(#arrowhead)"/>
    </g>

    <!-- Thought bubbles around the circle -->
    <g font-size="11" fill="#e0e0e0">
      <!-- Top -->
      <g transform="translate(0,-185)">
        <rect x="-95" y="-14" width="190" height="28" rx="14" fill="#16213e" stroke="#4a4a6a" stroke-width="1"/>
        <text text-anchor="middle" y="5">AssertionError?</text>
      </g>
      <!-- Top right -->
      <g transform="translate(160,-110)">
        <rect x="-95" y="-14" width="190" height="28" rx="14" fill="#16213e" stroke="#4a4a6a" stroke-width="1"/>
        <text text-anchor="middle" y="5">AssertionError!</text>
      </g>
      <!-- Right -->
      <g transform="translate(175,0)">
        <rect x="-80" y="-14" width="160" height="28" rx="14" fill="#16213e" stroke="#4a4a6a" stroke-width="1"/>
        <text text-anchor="middle" y="5">wait, same thing</text>
      </g>
      <!-- Bottom right -->
      <g transform="translate(160,110)">
        <rect x="-95" y="-14" width="190" height="28" rx="14" fill="#16213e" stroke="#4a4a6a" stroke-width="1"/>
        <text text-anchor="middle" y="5">AssertionError...</text>
      </g>
      <!-- Bottom -->
      <g transform="translate(0,185)">
        <rect x="-95" y="-14" width="190" height="28" rx="14" fill="#16213e" stroke="#4a4a6a" stroke-width="1"/>
        <text text-anchor="middle" y="5">missing 2nd 'i' ??</text>
      </g>
      <!-- Bottom left -->
      <g transform="translate(-160,110)">
        <rect x="-95" y="-14" width="190" height="28" rx="14" fill="#16213e" stroke="#4a4a6a" stroke-width="1"/>
        <text text-anchor="middle" y="5">A-s-s-e-r-t-i-o-n</text>
      </g>
      <!-- Left -->
      <g transform="translate(-175,0)">
        <rect x="-80" y="-14" width="160" height="28" rx="14" fill="#16213e" stroke="#4a4a6a" stroke-width="1"/>
        <text text-anchor="middle" y="5">looks identical...</text>
      </g>
      <!-- Top left -->
      <g transform="translate(-160,-110)">
        <rect x="-95" y="-14" width="190" height="28" rx="14" fill="#16213e" stroke="#4a4a6a" stroke-width="1"/>
        <text text-anchor="middle" y="5">let me try again</text>
      </g>
    </g>

    <!-- Robot face in center -->
    <rect x="-35" y="-35" width="70" height="70" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
    <!-- Eyes (spinning/dizzy) -->
    <g stroke="#e94560" stroke-width="2" fill="none">
      <circle cx="-12" cy="-8" r="8"/>
      <line x1="-17" y1="-13" x2="-7" y2="-3"/>
      <line x1="-7" y1="-13" x2="-17" y2="-3"/>
      <circle cx="12" cy="-8" r="8"/>
      <line x1="7" y1="-13" x2="17" y2="-3"/>
      <line x1="17" y1="-13" x2="7" y2="-3"/>
    </g>
    <!-- Dizzy mouth -->
    <path d="M -12,12 Q -6,20 0,12 Q 6,20 12,12" stroke="#e94560" stroke-width="2" fill="none"/>
    <!-- Antenna -->
    <line x1="0" y1="-35" x2="0" y2="-48" stroke="#e94560" stroke-width="2"/>
    <circle cx="0" cy="-51" r="4" fill="#e94560" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e94560" opacity="0.7"/>
    </marker>
  </defs>
</svg>
