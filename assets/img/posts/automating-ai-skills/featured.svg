<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="800" height="500" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-size="26" fill="#e2e8f0" font-weight="700">Automating AI Skills</text>
  <text x="400" y="77" text-anchor="middle" font-size="13" fill="#8b949e">Three layers: context, hooks, manual</text>

  <!-- Layer 1: Always-on context (CLAUDE.md) -->
  <g transform="translate(40, 100)">
    <rect width="720" height="100" rx="10" fill="#161b22" stroke="#3b82f6" stroke-width="2"/>
    <rect x="15" y="12" width="130" height="24" rx="5" fill="#1e3a5f"/>
    <text x="80" y="29" text-anchor="middle" font-size="11" fill="#93c5fd" font-weight="bold">CLAUDE.md</text>
    <text x="170" y="29" font-size="11" fill="#64748b">Persistent instructions &#x2014; loaded at session start</text>

    <!-- Global skills (always present) -->
    <text x="25" y="52" font-size="8" fill="#64748b">Global (~/.claude/)</text>
    <g transform="translate(25, 58)">
      <rect width="130" height="24" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
      <text x="65" y="17" text-anchor="middle" font-size="9" fill="#93c5fd">karpathy-guidelines</text>
    </g>
    <g transform="translate(165, 58)">
      <rect width="130" height="24" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
      <text x="65" y="17" text-anchor="middle" font-size="9" fill="#93c5fd">conventional-commit</text>
    </g>
    <g transform="translate(305, 58)">
      <rect width="130" height="24" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
      <text x="65" y="17" text-anchor="middle" font-size="9" fill="#93c5fd">pin-github-actions</text>
    </g>

    <!-- Project-scoped skills (when applicable) -->
    <text x="480" y="52" font-size="8" fill="#64748b">Per project</text>
    <g transform="translate(480, 58)">
      <rect width="80" height="24" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="40" y="17" text-anchor="middle" font-size="9" fill="#64748b">diataxis</text>
    </g>
    <g transform="translate(570, 58)">
      <rect width="110" height="24" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="55" y="17" text-anchor="middle" font-size="9" fill="#64748b">french-language</text>
    </g>
  </g>

  <!-- Layer 2: Event-driven hooks -->
  <g transform="translate(40, 215)">
    <rect width="720" height="110" rx="10" fill="#161b22" stroke="#f59e0b" stroke-width="2"/>
    <rect x="15" y="12" width="80" height="24" rx="5" fill="#3d2e0a"/>
    <text x="55" y="29" text-anchor="middle" font-size="11" fill="#fcd34d" font-weight="bold">Hooks</text>
    <text x="110" y="29" font-size="11" fill="#64748b">Event-driven enforcement &#x2014; fires per tool use</text>

    <!-- Hook cards -->
    <g transform="translate(15, 50)">
      <rect width="220" height="45" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
      <text x="10" y="18" font-size="9" fill="#f59e0b" font-weight="bold">PreToolUse &#x2022; Bash</text>
      <text x="10" y="35" font-size="10" fill="#fcd34d">conventional-commit guard</text>
      <rect x="170" y="7" width="40" height="16" rx="4" fill="#3d2e0a"/>
      <text x="190" y="19" text-anchor="middle" font-size="8" fill="#f59e0b">&lt;10ms</text>
    </g>

    <g transform="translate(250, 50)">
      <rect width="220" height="45" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
      <text x="10" y="18" font-size="9" fill="#f59e0b" font-weight="bold">PostToolUse &#x2022; Write|Edit</text>
      <text x="10" y="35" font-size="10" fill="#fcd34d">french-language accents</text>
      <rect x="170" y="7" width="40" height="16" rx="4" fill="#3d2e0a"/>
      <text x="190" y="19" text-anchor="middle" font-size="8" fill="#f59e0b">2-5s</text>
    </g>

    <g transform="translate(485, 50)">
      <rect width="220" height="45" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
      <text x="10" y="18" font-size="9" fill="#f59e0b" font-weight="bold">PostToolUse &#x2022; Write|Edit</text>
      <text x="10" y="35" font-size="10" fill="#fcd34d">pin-github-actions SHA</text>
      <rect x="170" y="7" width="40" height="16" rx="4" fill="#3d2e0a"/>
      <text x="190" y="19" text-anchor="middle" font-size="8" fill="#f59e0b">&lt;10ms</text>
    </g>
  </g>

  <!-- Layer 3: Manual on-demand -->
  <g transform="translate(40, 340)">
    <rect width="720" height="95" rx="10" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
    <rect x="15" y="12" width="80" height="24" rx="5" fill="#1e293b"/>
    <text x="55" y="29" text-anchor="middle" font-size="11" fill="#8b949e" font-weight="bold">Manual</text>
    <text x="110" y="29" font-size="11" fill="#64748b">On-demand audits &#x2014; invoked when needed</text>

    <!-- Manual skill badges (dimmer) -->
    <g transform="translate(15, 50)">
      <rect width="165" height="28" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="82" y="19" text-anchor="middle" font-size="10" fill="#8b949e">verify-readme-features</text>
    </g>
    <g transform="translate(195, 50)">
      <rect width="120" height="28" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="60" y="19" text-anchor="middle" font-size="10" fill="#8b949e">verify-pr-logs</text>
    </g>
    <g transform="translate(330, 50)">
      <rect width="140" height="28" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-size="10" fill="#8b949e">drawio-export-tools</text>
    </g>
    <g transform="translate(485, 50)">
      <rect width="145" height="28" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="72" y="19" text-anchor="middle" font-size="10" fill="#8b949e">local-branches-status</text>
    </g>
  </g>

  <!-- Bottom tagline -->
  <text x="400" y="468" text-anchor="middle" font-size="12" fill="#484f58">Invisible when it works &#x2014; obvious when it catches something</text>

  <!-- AI Skill badge -->
  <g transform="translate(755, 40)">
    <path d="M0,-16 L3.5,-5.5 L16,0 L3.5,5.5 L0,16 L-3.5,5.5 L-16,0 L-3.5,-5.5 Z" fill="#fbbf24" opacity="0.8"/>
    <circle r="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text y="28" text-anchor="middle" font-size="8" fill="#f59e0b" font-weight="bold">AI Skill</text>
  </g>
</svg>