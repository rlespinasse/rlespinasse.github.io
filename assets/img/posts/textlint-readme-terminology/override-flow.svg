<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="800" height="300" fill="#0f172a" rx="8"/>

  <!-- Step 1: Built-in terms -->
  <g transform="translate(40, 50)">
    <rect width="200" height="180" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="100" y="28" text-anchor="middle" font-size="13" fill="#94a3b8" font-weight="bold">Built-in terms</text>
    <line x1="15" y1="40" x2="185" y2="40" stroke="#334155" stroke-width="1"/>

    <text x="20" y="65" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">filename(s)?</text>
    <text x="20" y="85" font-size="11" fill="#ef4444" font-family="'SF Mono', 'Fira Code', monospace">readme(s)?</text>
    <text x="20" y="105" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">antipattern(s)?</text>
    <text x="20" y="125" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">open source</text>
    <text x="20" y="145" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">...</text>

    <!-- Strikethrough on readme -->
    <line x1="18" y1="81" x2="130" y2="81" stroke="#ef4444" stroke-width="1.5"/>
  </g>

  <!-- Arrow 1->2 -->
  <g transform="translate(250, 135)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="40,-5 50,0 40,5" fill="#475569"/>
    <text x="25" y="-10" text-anchor="middle" font-size="9" fill="#64748b">exclude</text>
  </g>

  <!-- Step 2: Filtered terms -->
  <g transform="translate(310, 50)">
    <rect width="180" height="180" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="90" y="28" text-anchor="middle" font-size="13" fill="#fcd34d" font-weight="bold">After exclude</text>
    <line x1="15" y1="40" x2="165" y2="40" stroke="#334155" stroke-width="1"/>

    <text x="20" y="65" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">filename(s)?</text>
    <text x="20" y="85" font-size="11" fill="#475569" font-style="italic" font-family="'SF Mono', 'Fira Code', monospace">(removed)</text>
    <text x="20" y="105" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">antipattern(s)?</text>
    <text x="20" y="125" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">open source</text>
    <text x="20" y="145" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">...</text>
  </g>

  <!-- Arrow 2->3 -->
  <g transform="translate(500, 135)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="40,-5 50,0 40,5" fill="#475569"/>
    <text x="25" y="-10" text-anchor="middle" font-size="9" fill="#64748b">+ terms</text>
  </g>

  <!-- Step 3: Final terms -->
  <g transform="translate(560, 50)">
    <rect width="200" height="180" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="100" y="28" text-anchor="middle" font-size="13" fill="#86efac" font-weight="bold">Final term list</text>
    <line x1="15" y1="40" x2="185" y2="40" stroke="#334155" stroke-width="1"/>

    <text x="20" y="65" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">filename(s)?</text>
    <text x="20" y="85" font-size="11" fill="#22c55e" font-family="'SF Mono', 'Fira Code', monospace">README(s)?</text>
    <text x="20" y="105" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">antipattern(s)?</text>
    <text x="20" y="125" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">open source</text>
    <text x="20" y="145" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">...</text>
  </g>

  <!-- Caption -->
  <text x="400" y="270" text-anchor="middle" font-size="12" fill="#64748b">Override a single built-in term without losing the rest</text>
</svg>
