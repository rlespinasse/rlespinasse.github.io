<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="800" height="500" fill="#0f172a" rx="12"/>

  <!-- Left side: wrong (crossed out) -->
  <g transform="translate(100, 120)">
    <rect width="250" height="200" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="125" y="35" text-anchor="middle" font-size="13" fill="#f87171" font-weight="bold">Default rule</text>

    <!-- readme lowercase -->
    <g transform="translate(30, 60)">
      <rect width="190" height="36" rx="6" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
      <text x="15" y="24" font-size="15" fill="#94a3b8" font-family="'SF Mono', 'Fira Code', monospace">readme</text>
      <rect x="120" y="8" width="55" height="20" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="147" y="23" text-anchor="middle" font-size="10" fill="#22c55e">correct</text>
    </g>

    <!-- README flagged -->
    <g transform="translate(30, 110)">
      <rect width="190" height="36" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1"/>
      <text x="15" y="24" font-size="15" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace">README</text>
      <rect x="120" y="8" width="55" height="20" rx="4" fill="#ef4444" opacity="0.15"/>
      <text x="147" y="23" text-anchor="middle" font-size="10" fill="#ef4444">error</text>
    </g>

    <!-- X mark -->
    <g transform="translate(210, 165)">
      <circle r="16" fill="#ef4444" opacity="0.2"/>
      <path d="M-7,-7 L7,7 M7,-7 L-7,7" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(370, 220)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="50,-5 60,0 50,5" fill="#475569"/>
    <text x="30" y="-10" text-anchor="middle" font-size="10" fill="#64748b">fix</text>
  </g>

  <!-- Right side: correct -->
  <g transform="translate(450, 120)">
    <rect width="250" height="200" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="125" y="35" text-anchor="middle" font-size="13" fill="#86efac" font-weight="bold">Custom override</text>

    <!-- README correct -->
    <g transform="translate(30, 60)">
      <rect width="190" height="36" rx="6" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
      <text x="15" y="24" font-size="15" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace">README</text>
      <rect x="120" y="8" width="55" height="20" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="147" y="23" text-anchor="middle" font-size="10" fill="#22c55e">correct</text>
    </g>

    <!-- READMEs correct -->
    <g transform="translate(30, 110)">
      <rect width="190" height="36" rx="6" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
      <text x="15" y="24" font-size="15" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace">READMEs</text>
      <rect x="120" y="8" width="55" height="20" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="147" y="23" text-anchor="middle" font-size="10" fill="#22c55e">correct</text>
    </g>

    <!-- Check mark -->
    <g transform="translate(210, 165)">
      <circle r="16" fill="#22c55e" opacity="0.2"/>
      <path d="M-7,0 L-2,5 L7,-5" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Config snippet at the bottom -->
  <g transform="translate(200, 370)">
    <rect width="400" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="15" y="22" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">"exclude": ["readme(s)?"],</text>
    <text x="15" y="42" font-size="11" fill="#64748b" font-family="'SF Mono', 'Fira Code', monospace">"terms": [["README(s)?", "README$1"]]</text>
    <text x="15" y="60" font-size="9" fill="#475569" font-family="'SF Mono', 'Fira Code', monospace">.textlintrc</text>
  </g>

  <!-- Title -->
  <text x="400" y="475" text-anchor="middle" font-size="16" fill="#e2e8f0" font-weight="bold">Textlint README Terminology Fix</text>
</svg>
