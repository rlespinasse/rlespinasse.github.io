      <text x="45" y="22" text-anchor="middle" font-size="12" fill="#fcd34d" font-weight="bold">.svg</text>
    </g>

    <g transform="translate(206, 0)">
      <rect width="90" height="34" rx="8" fill="#1a3a2a" stroke="#22c55e" stroke-width="1.5"/>
      <text x="45" y="22" text-anchor="middle" font-size="12" fill="#86efac" font-weight="bold">.mmd</text>
    </g>

    <g transform="translate(309, 0)">
      <rect width="90" height="34" rx="8" fill="#2a1a3a" stroke="#a855f7" stroke-width="1.5"/>
      <text x="45" y="22" text-anchor="middle" font-size="12" fill="#c084fc" font-weight="bold">.csv</text>
    </g>

    <g transform="translate(412, 0)">
      <rect width="90" height="34" rx="8" fill="#2a1a2a" stroke="#ec4899" stroke-width="1.5"/>
      <text x="45" y="22" text-anchor="middle" font-size="12" fill="#f9a8d4" font-weight="bold">.json</text>
    </g>

    <g transform="translate(515, 0)">
      <rect width="90" height="34" rx="8" fill="#2a1a1a" stroke="#ef4444" stroke-width="1.5"/>
      <text x="45" y="22" text-anchor="middle" font-size="12" fill="#fca5a5" font-weight="bold">.html</text>
    </g>
  </g>

  <!-- Process steps: 4 x w=120, arrows 40px, total=600, start=100 -->
  <g transform="translate(100, 378)">
    <rect width="120" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="60" y="25" text-anchor="middle" font-size="12" fill="#94a3b8">Scanner</text>

    <line x1="124" y1="20" x2="156" y2="20" stroke="#475569" stroke-width="1.5"/>
    <polygon points="156,15 168,20 156,25" fill="#475569"/>

    <g transform="translate(170, 0)">
      <rect width="120" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      <text x="60" y="25" text-anchor="middle" font-size="12" fill="#94a3b8">Analyser</text>
