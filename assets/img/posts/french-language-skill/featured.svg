<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="800" height="500" fill="#0f172a" rx="12"/>

  <!-- Header -->
  <text x="400" y="42" text-anchor="middle" font-size="22" fill="#e2e8f0" font-weight="bold">french-language</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#64748b">Accents et typographie françaises sur tous les formats de fichiers</text>

  <!-- Left panel: before -->
  <g transform="translate(65, 82)">
    <rect width="270" height="200" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="135" y="28" text-anchor="middle" font-size="13" fill="#f87171" font-weight="bold">Avant</text>

    <g transform="translate(20, 44)">
      <rect width="230" height="30" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
      <text x="12" y="21" font-size="14" fill="#94a3b8" font-family="'SF Mono','Fira Code',monospace">qualite</text>
    </g>

    <g transform="translate(20, 84)">
      <rect width="230" height="30" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
      <text x="12" y="21" font-size="14" fill="#94a3b8" font-family="'SF Mono','Fira Code',monospace">deploiement</text>
    </g>

    <g transform="translate(20, 124)">
      <rect width="230" height="30" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
      <text x="12" y="21" font-size="14" fill="#94a3b8" font-family="'SF Mono','Fira Code',monospace">résultat — succès</text>
    </g>

    <g transform="translate(226, 172)">
      <circle r="14" fill="#ef4444" opacity="0.2"/>
      <path d="M-6,-6 L6,6 M6,-6 L-6,6" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(355, 182)">
    <line x1="0" y1="0" x2="65" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="65,-5 80,0 65,5" fill="#475569"/>
    <text x="37" y="-10" text-anchor="middle" font-size="10" fill="#64748b">corrige</text>
  </g>

  <!-- Right panel: after -->
  <g transform="translate(465, 82)">
    <rect width="270" height="200" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="135" y="28" text-anchor="middle" font-size="13" fill="#86efac" font-weight="bold">Après</text>

    <g transform="translate(20, 44)">
      <rect width="230" height="30" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
      <text x="12" y="21" font-size="14" fill="#e2e8f0" font-family="'SF Mono','Fira Code',monospace">qualité</text>
    </g>

    <g transform="translate(20, 84)">
      <rect width="230" height="30" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
      <text x="12" y="21" font-size="14" fill="#e2e8f0" font-family="'SF Mono','Fira Code',monospace">déploiement</text>
    </g>

    <g transform="translate(20, 124)">
      <rect width="230" height="30" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
      <text x="12" y="21" font-size="14" fill="#e2e8f0" font-family="'SF Mono','Fira Code',monospace">résultat : succès</text>
    </g>

    <g transform="translate(226, 172)">
      <circle r="14" fill="#22c55e" opacity="0.2"/>
      <path d="M-7,0 L-2,5 L7,-6" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

