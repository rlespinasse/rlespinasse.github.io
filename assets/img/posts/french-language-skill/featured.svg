  <g transform="translate(97, 314)">
    <rect width="90" height="34" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="45" y="22" text-anchor="middle" font-size="12" fill="#93c5fd" font-weight="bold">.md</text>

    <g transform="translate(103, 0)">
