<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#1e2d3d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- Left side: Stacked translucent polygon layers -->
  <!-- Layer 3 (bottom, largest) - map-orange -->
  <polygon points="80,380 260,340 320,400 240,430 100,420" fill="#e8a838" fill-opacity="0.25" stroke="#e8a838" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="100,350 280,310 340,370 260,400 120,390" fill="#e8a838" fill-opacity="0.2" stroke="#e8a838" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Layer 2 (middle) - map-blue -->
  <polygon points="120,320 240,270 330,320 280,370 140,360" fill="#4a9ede" fill-opacity="0.3" stroke="#4a9ede" stroke-width="1.5" stroke-opacity="0.7"/>
  <polygon points="140,290 260,240 350,290 300,340 160,330" fill="#4a9ede" fill-opacity="0.2" stroke="#4a9ede" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Layer 1 (top, smallest) - map-green -->
  <polygon points="160,260 250,220 310,260 270,310 180,300" fill="#3dba6e" fill-opacity="0.35" stroke="#3dba6e" stroke-width="2" stroke-opacity="0.8"/>
  <polygon points="180,230 270,190 330,230 290,280 200,270" fill="#3dba6e" fill-opacity="0.25" stroke="#3dba6e" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Small map markers on top layer -->
  <circle cx="220" cy="240" r="4" fill="#3dba6e" opacity="0.9"/>
  <circle cx="260" cy="255" r="3" fill="#4a9ede" opacity="0.8"/>
  <circle cx="190" cy="280" r="3.5" fill="#e8a838" opacity="0.8"/>

  <!-- Contour lines decorative element -->
  <path d="M60,180 Q150,150 200,170 T320,160" fill="none" stroke="#3dba6e" stroke-width="0.8" opacity="0.3"/>
  <path d="M70,195 Q160,165 210,185 T330,175" fill="none" stroke="#3dba6e" stroke-width="0.6" opacity="0.2"/>
  <path d="M80,210 Q170,180 220,200 T340,190" fill="none" stroke="#3dba6e" stroke-width="0.5" opacity="0.15"/>

  <!-- Right side: JSON config block -->
  <rect x="440" y="180" width="310" height="200" rx="8" fill="#141c28" stroke="#2a3a4e" stroke-width="1.5"/>

  <!-- Code editor dots -->
  <circle cx="460" cy="198" r="4" fill="#ff5f56"/>
  <circle cx="475" cy="198" r="4" fill="#ffbd2e"/>
  <circle cx="490" cy="198" r="4" fill="#27c93f"/>

  <!-- JSON content -->
  <text x="460" y="235" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7a8899">{</text>
  <text x="475" y="255" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
    <tspan fill="#e8a838">"target"</tspan><tspan fill="#7a8899">: </tspan><tspan fill="#3dba6e">"map"</tspan><tspan fill="#7a8899">,</tspan>
  </text>
  <text x="475" y="275" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
    <tspan fill="#e8a838">"layers"</tspan><tspan fill="#7a8899">: [</tspan>
  </text>
  <text x="490" y="295" font-family="'SF Mono', 'Fira Code', monospace" font-size="12">
    <tspan fill="#7a8899">{ </tspan><tspan fill="#e8a838">"name"</tspan><tspan fill="#7a8899">: </tspan><tspan fill="#3dba6e">"heritage"</tspan><tspan fill="#7a8899"> },</tspan>
  </text>
  <text x="490" y="315" font-family="'SF Mono', 'Fira Code', monospace" font-size="12">
    <tspan fill="#7a8899">{ </tspan><tspan fill="#e8a838">"name"</tspan><tspan fill="#7a8899">: </tspan><tspan fill="#3dba6e">"boundaries"</tspan><tspan fill="#7a8899"> },</tspan>
  </text>
  <text x="490" y="335" font-family="'SF Mono', 'Fira Code', monospace" font-size="12">
    <tspan fill="#7a8899">{ </tspan><tspan fill="#e8a838">"name"</tspan><tspan fill="#7a8899">: </tspan><tspan fill="#3dba6e">"geology"</tspan><tspan fill="#7a8899"> }</tspan>
  </text>
  <text x="475" y="355" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7a8899">]</text>
  <text x="460" y="370" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7a8899">}</text>

  <!-- Arrow connecting layers to config -->
  <path d="M360,280 C390,280 410,260 435,260" fill="none" stroke="#4a9ede" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <polygon points="435,255 445,260 435,265" fill="#4a9ede" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="80" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">Leaflet Atlas</text>
  <text x="400" y="110" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="15" fill="#7a9cb8" text-anchor="middle" letter-spacing="2">CONFIG-DRIVEN INTERACTIVE MAPS</text>

  <!-- Decorative bottom line -->
  <line x1="150" y1="460" x2="650" y2="460" stroke="#2a3a4e" stroke-width="1"/>
  <line x1="300" y1="460" x2="500" y2="460" stroke="#4a9ede" stroke-width="2"/>
</svg>