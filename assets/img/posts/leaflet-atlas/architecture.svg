<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#1e2d3d"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9ede"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3dba6e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e8a838"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#archBg)"/>

  <!-- Title -->
  <text x="400" y="35" font-size="16" fill="#7a9cb8" text-anchor="middle" letter-spacing="2">VIRTUOUS CYCLE</text>

  <!-- === BOXES === -->

  <!-- Bassin Minier (top left) -->
  <rect x="50" y="70" width="220" height="70" rx="8" fill="#2a1a0a" stroke="#e8a838" stroke-width="1.5"/>
  <text x="160" y="100" font-size="14" font-weight="600" fill="#e8a838" text-anchor="middle">Bassin Minier</text>
  <text x="160" y="120" font-size="11" fill="#b8956a" text-anchor="middle">UNESCO Heritage Map</text>

  <!-- Leaflet Atlas (center) -->
  <rect x="290" y="170" width="220" height="80" rx="8" fill="#0a2a1a" stroke="#3dba6e" stroke-width="2"/>
  <text x="400" y="200" font-size="16" font-weight="700" fill="#3dba6e" text-anchor="middle">Leaflet Atlas</text>
  <text x="400" y="220" font-size="11" fill="#6aad8a" text-anchor="middle">npm package</text>
  <text x="400" y="236" font-family="'SF Mono', monospace" font-size="10" fill="#4a7a5e" text-anchor="middle">leaflet-atlas</text>

  <!-- Morvan (top right) -->
  <rect x="530" y="70" width="220" height="70" rx="8" fill="#1a1a2a" stroke="#7a6ade" stroke-width="1.5"/>
  <text x="640" y="100" font-size="14" font-weight="600" fill="#7a6ade" text-anchor="middle">Morvan</text>
  <text x="640" y="120" font-size="11" fill="#9a8abe" text-anchor="middle">Regional Nature Park Map</text>

  <!-- === ARROWS (rounded corners, parallel with consistent spacing) === -->

  <!-- 1. Extraction: Bassin Minier → Leaflet Atlas (blue, solid) -->
  <path d="M270,105 L320,105 Q340,105 340,125 L340,170" fill="none" stroke="#4a9ede" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="340" y="95" font-size="10" fill="#4a9ede" text-anchor="middle">extraction</text>

  <!-- 2. Powers: Leaflet Atlas → Bassin Minier (green, solid) -->
  <!--    LA left y=192 → BM bottom x=135 — upper arrow of the pair -->
  <path d="M290,192 L155,192 Q135,192 135,172 L135,140" fill="none" stroke="#3dba6e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="218" y="186" font-size="10" fill="#3dba6e" text-anchor="middle">powers</text>

  <!-- 3. Powers: Leaflet Atlas → Morvan (green, solid) -->
  <!--    LA right y=192 → Morvan bottom x=665 — upper arrow of the pair -->
  <path d="M510,192 L645,192 Q665,192 665,172 L665,140" fill="none" stroke="#3dba6e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="582" y="186" font-size="10" fill="#3dba6e" text-anchor="middle">powers</text>

  <!-- 4. New needs: Bassin Minier → Leaflet Atlas (orange, dashed) -->
  <!--    BM bottom x=185 → LA left y=228 — lower arrow of the pair -->
  <path d="M185,140 L185,208 Q185,228 205,228 L290,228" fill="none" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="240" y="242" font-size="10" fill="#e8a838" text-anchor="middle">new needs</text>

  <!-- 5. New needs: Morvan → Leaflet Atlas (orange, dashed) -->
  <!--    Morvan bottom x=615 → LA right y=228 — lower arrow of the pair -->
  <path d="M615,140 L615,208 Q615,228 595,228 L510,228" fill="none" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="560" y="242" font-size="10" fill="#e8a838" text-anchor="middle">new needs</text>

  <!-- === BOTTOM SUMMARY === -->

  <rect x="100" y="300" width="180" height="55" rx="6" fill="#1a2332" stroke="#2a3a4e" stroke-width="1"/>
  <text x="190" y="322" font-size="11" fill="#7a9cb8" text-anchor="middle">Map projects reveal</text>
  <text x="190" y="338" font-size="11" fill="#7a9cb8" text-anchor="middle">new requirements</text>

  <line x1="290" y1="327" x2="330" y2="327" stroke="#4a9ede" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="340" y="300" width="180" height="55" rx="6" fill="#1a2332" stroke="#2a3a4e" stroke-width="1"/>
  <text x="430" y="322" font-size="11" fill="#7a9cb8" text-anchor="middle">Features flow into</text>
  <text x="430" y="338" font-size="11" fill="#7a9cb8" text-anchor="middle">Leaflet Atlas</text>

  <line x1="530" y1="327" x2="570" y2="327" stroke="#4a9ede" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="580" y="300" width="180" height="55" rx="6" fill="#1a2332" stroke="#2a3a4e" stroke-width="1"/>
  <text x="670" y="322" font-size="11" fill="#7a9cb8" text-anchor="middle">All maps benefit</text>
  <text x="670" y="338" font-size="11" fill="#7a9cb8" text-anchor="middle">from improvements</text>
</svg>
