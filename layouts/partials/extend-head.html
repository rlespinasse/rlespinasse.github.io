{{- /* WebSite schema for homepage with SearchAction */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ .Title | jsonify }},
  "url": {{ .BaseURL | jsonify }},
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": {{ printf "%ssearch/?q={search_term_string}" .BaseURL | jsonify }}
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
